<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(#0f1f3a,#162a4d);
  color:white;
  text-align:center;
}

/* العنوان */
h1 {
  color: gold;
  margin-top:30px;
  font-size:32px;
  font-weight:700;
}

/* الحاوية */
.container {
  display:flex;
  justify-content:center;
  padding:20px;
}

/* الكرت */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  width:92%;
  max-width:450px;
  overflow:hidden;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

/* الصورة */
.card img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* النص */
.card-content {
  padding:25px;
  line-height:2.1;
  font-size:18px;
  font-weight:600;
}

/* السعر */
.price {
  color:gold;
  font-size:28px;
  font-weight:700;
  margin:15px 0;
}

/* الزر */
.btn {
  background:gold;
  color:black;
  padding:15px 30px;
  border-radius:14px;
  text-decoration:none;
  display:inline-block;
  margin-top:10px;
  font-weight:700;
  font-size:17px;
}

/* رجوع */
.back {
  display:block;
  margin-top:20px;
  color:#aaa;
  text-decoration:none;
}
</style>

</head>
