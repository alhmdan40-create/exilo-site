<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<style>

/* عام */
body {
  margin: 0;
  font-family: sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

/* القسم */
.section {
  padding: 40px 20px;
  background: #0b1d3a;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 26px;
  margin-bottom: 30px;
  font-weight: bold;
}

/* الكروت */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 15px;
}

/* الكارد */
.card {
  background: linear-gradient(145deg, #1e2a44, #24365a);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 48%;
  box-sizing: border-box;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  border: 1px solid rgba(242, 201, 76, 0.2);
  transition: 0.3s;
}

/* حركة كمبيوتر */
.card:hover {
  transform: translateY(-5px);
}

/* ضغط جوال */
.card:active {
  transform: scale(0.97);
}

/* الأيقونة */
.icon {
  font-size: 30px;
  margin-bottom: 10px;
}

/* النص */
.text {
  color: white;
  font-size: 16px;
}

/* الجوال */
@media (max-width: 600px) {
  .card {
    width: 100%;
  }
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-new.png">
</div>

<!-- لماذا إكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
