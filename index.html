<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --navy: #050a14;
    --gold: #c5a059;
    --text: #e6f1ff;
    --dark-grey: #0a0f1a;
    --card-bg: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; transition: all 0.3s ease; }

body {
    font-family: 'Tajawal', sans-serif;
    background-color: var(--navy);
    color: var(--text);
    margin: 0;
}

/* القائمة */
#sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: var(--dark-grey);
    padding: 25px;
    z-index: 2000;
    border-left: 2px solid var(--gold);
}

#sidebar a { display:block; color:white; margin:15px 0; }

.menu-title { cursor:pointer; }

.submenu { display:none; padding-right:10px; }

#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:1500;
}

header {
    padding: 15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--gold);
}

.logout-btn {
    background: var(--gold);
    padding:7px 18px;
    border-radius:8px;
}

.hero {
    height: 400px;
    background: url('banner.png%202.PNG');
    background-size: cover;
}

/* باقي تصميمك */
.main-content { padding:60px 20px; }

</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- القائمة -->
<div id="sidebar">
<div onclick="toggleSidebar()">✕</div>

<a href="index.html">الرئيسية</a>

<div onclick="toggleMenu('courses')">الدورات</div>
<div id="courses" class="submenu">
<a href="body-language-course.html">لغة الجسد</a>
<a href="character-analysis-course.html">تحليل الشخصيات</a>
</div>

<a href="sessions.html">الجلسات</a>
<a href="exelo-store.html">المتجر</a>
<a href="reviews.html">آراء العملاء</a>
</div>

<header>

<div onclick="toggleSidebar()">☰</div>

<div>
<button id="logoutBtn" onclick="logout()">خروج</button>
<a href="login.html" id="loginBtn" style="display:none;">تسجيل الدخول</a>
</div>

<div>EXILO</div>

</header>

<div class="hero"></div>

<main class="main-content">
<h2>رجعت الصفحة 🎉</h2>
</main>

<!-- سكربت القائمة -->
<script>
function toggleSidebar(){
let s=document.getElementById("sidebar");
let o=document.getElementById("overlay");

if(s.style.right==="0px"){
s.style.right="-260px";
o.style.display="none";
}else{
s.style.right="0px";
o.style.display="block";
}
}

function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
