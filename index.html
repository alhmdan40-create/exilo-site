<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو | المدرب هاني آل حمدان</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fbfcfd;
            direction: rtl;
            overflow-x: hidden;
        }

        .top-notice {
            background: linear-gradient(90deg, #b59410, #d4af37);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            position: relative;
            z-index: 20;
        }

        /* حاوية الهيدر */
        header {
            width: 100%;
            height: 400px; /* تقليل الارتفاع لإخفاء الجزء السفلي من الصورة */
            overflow: hidden; /* قص أي جزء يخرج عن الإطار */
            background-color: var(--navy);
            border-bottom: 6px solid var(--gold);
            position: relative;
        }

        /* تنسيق الصورة لتظهر بعرض كامل وتنزاح للأعلى */
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            margin-top: -20px; /* رفع الصورة للأعلى قليلاً لإخفاء سطر الاسم */
        }

        .content-container {
            max-width: 1000px;
            margin: -60px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 30;
        }

        .welcome-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
        }

        /* تحسين العرض للجوال */
        @media (max-width: 768px) {
            header { height: 250px; }
            .banner-img { margin-top: -10px; }
            .welcome-box { padding: 25px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="top-notice">✨ بوابتكم الرقمية للارتقاء والاسترخاء | خصم خاص لفترة محدودة ✨</div>

    <header>
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
    </header>

    <div class="content-container">
        <section class="welcome-box">
            <h2 style="color: var(--navy);">مرحباً بك في عالم إكسيلو</h2>
            <p style="color: #555;">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
