
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --white: #ffffff;
            --site-bg: #fbfcfd;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--site-bg);
            direction: rtl;
            overflow-x: hidden;
            color: #333;
        }

        /* حاوية البانر الأساسية (البحر والصخور) */
        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        /* البانر يظهر نظيفاً الآن وبدون أي لوجو مدمج فيه */
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* مساحة المحتوى */
        .content-container {
            max-width: 900px;
            margin: -50px auto 80px; /* تداخل خفيف مع البانر لزيادة الفخامة */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* المربع الأبيض الترحيبي */
        .welcome-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); /* ظل ناعم وأنيق */
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        /* --- تنسيق اللوجو الكامل الفخم (الدرع الذهبي المزخرف) في المربع الأبيض --- */
        .logo-prominent {
            height: 120px; /* حجم بارز وملفت للدرع */
            width: auto;
            margin: 0 auto 30px;
            display: block;
            /* إضافة ظل ناعم للشعار ليعطيه عمقاً */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .welcome-title {
            color: var(--navy);
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .welcome-desc {
            color: #555;
            font-size: 1.15rem;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        /* تنسيق الزر المطلوب: احجز جلستك الآن */
        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.15rem;
            box-shadow: 0 5px 15px rgba(10,25,47,0.2);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(10,25,47,0.3);
            background-color: #112a4f;
        }

        @media (max-width: 768px) {
            .content-container { margin-top: -20px; }
            .welcome-box { padding: 30px 20px; }
            .logo-prominent { height: 90px; margin-bottom: 20px; }
            .welcome-title { font-size: 1.8rem; }
            .welcome-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
    </div>

    <div class="content-container">
        <section class="welcome-box">
            
            <img src="logo_new.png" alt="Exilo New Logo" class="logo-prominent">
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            
            <p class="welcome-desc">
                بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.
            </p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
