<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  height: auto;
  display: block;
}

/* القسم */
.section {
  padding: 40px 15px;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 28px;
  margin-bottom: 30px;
  font-weight: 700;
}

/* الكروت */
.card {
  width: 48%;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-sizing: border-box;

  /* Glass effect */
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);

  /* Border ذهبي خفيف */
  border: 1px solid rgba(242, 201, 76, 0.25);

  /* ظل فاخر */
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

/* توهج ذهبي */
.card::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(242,201,76,0.15), transparent 60%);
  transform: rotate(25deg);
}

/* حركة عند المرور */
.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 40px rgba(0,0,0,0.8);
}

/* النص */
.text {
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.7;
}

/* الأيقونة */
.icon {
  font-size: 34px;
  margin-bottom: 12px;
}
/* النص */
.text {
  color: #ffffff;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG?v=30">
</div>

<!-- لماذا إكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
