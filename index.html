<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو | المدرب هاني آل حمدان</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --bg-soft: #fbfcfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            direction: rtl;
        }

        .top-notice {
            background: linear-gradient(90deg, #b59410, #d4af37);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* حاوية البانر لضمان عرض 100% */
        .banner-container {
            width: 100%;
            line-height: 0; /* لإزالة أي فراغات تحت الصورة */
            background-color: var(--navy);
            border-bottom: 6px solid var(--gold);
        }

        /* جعل الصورة تتمدد لتملأ العرض بالكامل وتعدل طولها تلقائياً */
        .banner-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 1000px;
            margin: -40px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        .logo-small {
            height: 50px;
            margin: 0 auto 20px;
            display: block;
        }

        .btn-cta {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
        }

        @media (max-width: 768px) {
            .container { margin-top: -20px; }
            .welcome-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="top-notice">✨ بوابتكم الرقمية للارتقاء والاسترخاء | خصم خاص لفترة محدودة ✨</div>

    <div class="banner-container">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-image">
    </div>

    <div class="container">
        <section class="welcome-card">
            <img src="logo.png.PNG" alt="Exilo Logo" class="logo-small">
            <h2 style="color: var(--navy);">مرحباً بك في عالم إكسيلو</h2>
            <p style="color: #555;">نحن نقدم لك الأدوات العلمية والتدريبية الأكثر تطوراً للوصول إلى السلام الداخلي والارتقاء بجودة حياتك، تحت إشراف المدرب هاني آل حمدان بأساليب مبتكرة.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="btn-cta">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
