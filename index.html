<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO | إكسيلو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(to bottom, #0b1d3a, #0e2a52);
  color: white;
}

/* البنر */
.banner img {
  width: 100%;
  display: block;
}

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 26px;
  background: rgba(0,0,0,0.6);
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 10000;
}

/* القائمة الجانبية */
.sidebar {
  position: fixed;
  top: 0;
  right: -270px;
  width: 270px;
  height: 100%;
  background: #0b1d3a;
  padding: 25px;
  transition: 0.3s;
  z-index: 9999;
  box-shadow: -5px 0 25px rgba(0,0,0,0.5);
}

.sidebar.active {
  right: 0;
}

.sidebar a {
  display: block;
  margin: 20px 0;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

.close-btn {
  font-size: 22px;
  cursor: pointer;
}

/* العنوان */
.title {
  text-align: center;
  color: #d4af37;
  font-size: 28px;
  margin: 40px 0 20px;
  font-weight: bold;
}

/* المربعات */
.features {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

.box {
  padding: 30px 15px;
  border-radius: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.box1 { background: linear-gradient(135deg, #5f2c82, #49a09d); }
.box2 { background: linear-gradient(135deg, #1e3c72, #2a5298); }
.box3 { background: linear-gradient(135deg, #ff512f, #dd2476); }
.box4 { background: linear-gradient(135deg, #11998e, #38ef7d); }

/* الفاصل */
.divider {
  width: 60%;
  height: 1px;
  margin: 40px auto;
  background: linear-gradient(to right, transparent, #d4af37, transparent);
}

/* الأقسام */
.services {
  padding: 20px;
}

.service-card {
  margin-bottom: 30px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 20px;
}

.service-card img {
  width: 90%;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
}

.service-title {
  font-size: 20px;
  color: #d4af37;
  margin-top: 10px;
}

.service-text {
  font-size: 15px;
  color: #ddd;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  background: #d4af37;
  color: black;
  padding: 8px 18px;
  border-radius: 20px;
  text-decoration: none;
}

/* الفوتر */
.footer {
  text-align: center;
  padding: 25px;
  background: rgba(0,0,0,0.2);
}

.footer a {
  color: #d4af37;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="menu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>
  <a href="#">الرئيسية</a>
  <a href="#">الدورات</a>
  <a href="#">الجلسات</a>
  <a href="#">الكتب</a>
  <a href="#">تسجيل الدخول</a>
</div>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG">
</div>

<!-- لماذا -->
<div class="title">لماذا إكسيلو؟</div>

<div class="features">
  <div class="box box1">🧠 فهم عميق لذاتك</div>
  <div class="box box2">🚀 نصنع تحول حقيقي</div>
  <div class="box box3">🔥 تغيير فعلي</div>
  <div class="box box4">🎯 وضوح في حياتك</div>
</div>

<div class="divider"></div>

<!-- الأقسام -->
<div class="services">

  <div class="service-card">
    <img src="sessions.png.PNG">
    <div class="service-title">الجلسات</div>
    <div class="service-text">ابدأ التغيير الحقيقي الآن</div>
    <a href="#" class="btn">ابدأ</a>
  </div>

  <div class="service-card">
    <img src="courses.png.jpg">
    <div class="service-title">الدورات</div>
    <div class="service-text">طور نفسك وابدأ رحلتك</div>
    <a href="#" class="btn">استكشف</a>
  </div>

  <div class="service-card">
    <img src="books.png.jpg">
    <div class="service-title">الكتب</div>
    <div class="service-text">محتوى يغير طريقة تفكيرك</div>
    <a href="#" class="btn">تصفح</a>
  </div>

</div>

<!-- الفوتر -->
<div class="footer">
  <a href="#">الشروط والأحكام</a>
  <div>© 2026 EXILO</div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
