
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --gold: #b59410; --site-bg: #fbfcfd; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--site-bg); direction: rtl; }

        /* البانر نظيف تماماً الآن */
        .banner-wrapper { position: relative; width: 100%; line-height: 0; border-bottom: 5px solid var(--gold); }
        .banner-img { width: 100%; height: auto; display: block; }
        .mask-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 16%; background-color: var(--site-bg); z-index: 5; }

        .content-container { max-width: 900px; margin: -60px auto 80px; padding: 0 20px; position: relative; z-index: 10; }
        .welcome-box { background: white; padding: 45px 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.07); text-align: center; border-top: 7px solid var(--navy); }

        /* الشعار الدرع الكامل (الذي أرفقته أنت في الصورة) */
        .main-brand-logo { 
            width: 180px; 
            height: auto; 
            margin: 0 auto 25px; 
            display: block; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); 
        }

        .welcome-title { color: var(--navy); font-size: 2.3rem; margin-bottom: 15px; font-weight: 700; }
        .welcome-desc { color: #444; font-size: 1.15rem; line-height: 1.8; margin-bottom: 35px; }

        .cta-btn { 
            display: inline-block; 
            background: var(--navy); 
            color: white; 
            padding: 18px 65px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem;
            box-shadow: 0 6px 20px rgba(10,25,47,0.25);
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Banner Clean" class="banner-img">
        <div class="mask-bottom"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            <img src="brand_final_exilo.png" alt="Exilo Shield Logo" class="main-brand-logo">
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            <p class="welcome-desc">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
