<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
--navy: #050a14;
--gold: #c5a059;
--text: #e6f1ff;
--dark-grey: #0a0f1a;
--card-bg: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; transition: all 0.3s ease; }

body {
font-family: 'Tajawal', sans-serif;
background-color: var(--navy);
color: var(--text);
margin: 0;
display: flex;
flex-direction: column;
min-height: 100vh;
}

header {
background: var(--navy);
padding: 15px 5%;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 2px solid var(--gold);
position: sticky;
top: 0;
z-index: 1000;
}

.user-section { display: flex; align-items: center; gap: 15px; }

.user-email { color: var(--gold); font-size: 0.9rem; }

.logout-btn {
background: var(--gold);
color: var(--navy);
padding: 7px 18px;
border-radius: 8px;
border: none;
cursor: pointer;
display: none;
}

.login-btn {
background: var(--gold);
color: var(--navy);
padding: 7px 18px;
border-radius: 8px;
text-decoration: none;
font-weight: bold;
}

.logo-text { color: var(--gold); font-size: 1.6rem; }

.hero {
width: 100%;
height: 400px;
background: url('banner.png%202.PNG') center/cover no-repeat;
border-bottom: 4px solid var(--gold);
}

.main-content { flex: 1; padding: 60px 20px; }

.section-intro { text-align: center; margin-bottom: 60px; }

.section-intro h2 { color: var(--gold); font-size: 2.5rem; }

.services-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap: 40px;
max-width: 1200px;
margin: auto;
}

.service-card {
background: var(--card-bg);
border-radius: 25px;
border: 1px solid rgba(197,160,89,0.2);
padding: 25px;
text-align: center;
}

.image-container {
width: 100%;
height: 280px;
overflow: hidden;
border-radius: 18px;
margin-bottom: 20px;
}

.image-container img {
width: 100%;
height: 100%;
object-fit: cover;
}

.action-btn {
display: block;
background: var(--gold);
color: var(--navy);
padding: 14px;
border-radius: 12px;
text-decoration: none;
font-weight: bold;
}

footer {
background: var(--dark-grey);
padding: 50px 20px;
border-top: 2px solid var(--gold);
text-align: center;
}
</style>
</head>

<body>

<header>
<div><i class="fas fa-bars" style="color:gold"></i></div>

<div class="user-section">

<a href="login.html" id="loginBtn" class="login-btn">تسجيل دخول</a>

<button id="logoutBtn" class="logout-btn">خروج</button>

<span id="userEmail" class="user-email"></span>

<i class="fas fa-user-circle" style="color:gold"></i>

</div>

<div class="logo-text">EXILO</div>
</header>

<div class="hero"></div>

<main class="main-content">
<div class="section-intro">
<h2>لماذا إكسيلو؟</h2>
<p>نحن نصمم لك رحلة تحول حقيقية...</p>
</div>

<div class="services-grid">

<div class="service-card">
<div class="image-container">
<img src="courses.png.PNG">
</div>
<h3>الدورات الرقمية</h3>
<a href="courses-details.html" class="action-btn">اكتشف برامجنا</a>
</div>

<div class="service-card">
<div class="image-container">
<img src="sessions.png.PNG">
</div>
<h3>الجلسات والاستشارات</h3>
<a href="https://wa.me/966538205304" class="action-btn">احجز استشارتك</a>
</div>

<div class="service-card">
<div class="image-container">
<img src="store.png.jpg">
</div>
<h3>المتجر الرقمي</h3>
<a href="exelo-store.html" class="action-btn">تصفح المتجر</a>
</div>

</div>
</main>

<footer>
<p>© 2026 إكسيلو</p>
</footer>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
authDomain: "exilo-376f1.firebaseapp.com",
projectId: "exilo-376f1",
storageBucket: "exilo-376f1.appspot.com",
messagingSenderId: "736619072060",
appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const userEmail = document.getElementById("userEmail");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, (user) => {
if (user) {
userEmail.textContent = user.email;
loginBtn.style.display = "none";
logoutBtn.style.display = "inline-block";
} else {
userEmail.textContent = "";
loginBtn.style.display = "inline-block";
logoutBtn.style.display = "none";
}
});

logoutBtn.addEventListener("click", () => {
signOut(auth).then(() => {
location.reload();
});
});

</script>

</body>
</html>
