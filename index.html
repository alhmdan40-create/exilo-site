<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0b1e3a, #142f55);
  color: white;
}

/* الهيدر */
header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: 900;
  color: #d4af37;
}

/* البنر */
.hero img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-bottom: 2px solid rgba(255,255,255,0.1);
}

/* العنوان */
.section-title {
  text-align: center;
  margin: 30px 0;
  font-size: 26px;
  color: #d4af37;
  font-weight: 900;
}

/* الكروت */
.card {
  background: rgba(255,255,255,0.08);
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card h3 {
  font-size: 22px;
}

.card p {
  color: #ddd;
  margin: 10px 0;
}

.price {
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
}

/* الأزرار */
.btn {
  display: inline-block;
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  color: black;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
}

/* الدفع */
.payments {
  margin: 30px 20px;
  padding: 25px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  text-align: center;
}

.payments img {
  width: 90px;
  margin: 10px;
}

/* واتساب */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 14px 22px;
  border-radius: 30px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* الفوتر */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
}

</style>
</head>

<body>

<header>EXILO</header>

<!-- البنر -->
<section class="hero">
  <img src="banner-top.png.PNG" alt="banner">
</section>

<!-- المنتجات -->
<div class="section-title">الدورات المتاحة</div>

<div class="card">
  <h3>دورة تحليل الشخصية</h3>
  <p>تحليل الخط والتوقيع والرسومات</p>
  <div class="price">149 ريال</div>

  <a href="https://wa.me/966530205304?text=أبغى شراء دورة تحليل الشخصية" class="btn">
    شراء الآن
  </a>
</div>

<div class="card">
  <h3>جلسات كوتشينج</h3>
  <p>جلسات تدريبية مباشرة لتطوير الذات</p>
  <div class="price">200 ريال</div>

  <a href="https://wa.me/966530205304?text=أبغى حجز جلسة كوتشينج" class="btn">
    احجز الآن
  </a>
</div>

<!-- الدفع -->
<div class="payments">
  <h3>ادفع بثقة وأمان 🔒</h3>
  <p>نقبل الدفع عبر Apple Pay و مدى</p>

  <img src="mada.png" alt="mada">
  <img src="applepay.png" alt="apple pay">
</div>

<!-- واتساب -->
<a class="whatsapp" href="https://wa.me/966530205304">
  واتساب
</a>

<!-- الفوتر -->
<footer>
© 2026 EXILO - جميع الحقوق محفوظة
</footer>

</body>
</html>
