<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو للارتقاء والاسترخاء</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: #f4f7f9;
            direction: rtl;
        }

        .top-bar {
            background: linear-gradient(90deg, #b59410, #d4af37);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
        }

        /* هذا الجزء هو المسؤول عن إظهار البانر */
        header {
            width: 100%;
            height: 450px;
            background-image: url('IMG_2163.png'); /* تم تعديل الاسم ليطابق ملفك المرفوع */
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--gold);
        }

        .main-content {
            max-width: 900px;
            margin: -50px auto 50px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h1 { color: var(--navy); margin-bottom: 20px; }
        p { color: #555; font-size: 1.1rem; line-height: 1.8; }

        .cta-button {
            display: inline-block;
            background-color: var(--navy);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(10, 25, 47, 0.3);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="top-bar">✨ بوابتكم الرقمية للارتقاء والاسترخاء | خصم خاص لفترة محدودة ✨</div>

    <header></header>

    <div class="main-content">
        <h1>مرحباً بك في عالم إكسيلو</h1>
        <p>بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني، تحت إشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
        <a href="#" class="cta-button">احجز جلستك الاستشارية الآن</a>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | EXILO</p>
    </footer>

</body>
</html>
