<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(#0f1f3a, #162a4d);
  color: white;
  text-align: center;
}

h1 {
  color: gold;
  margin: 30px 0;
}

.section-title {
  color: gold;
  font-size: 28px;
  margin: 40px 0 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 0 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  width: 300px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.card h2 {
  margin: 10px 0;
}

.card p {
  color: #ccc;
  font-size: 14px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  background: gold;
  color: black;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.session-box {
  margin: 20px;
}

.session-box img {
  width: 90%;
  max-width: 500px;
  border-radius: 20px;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>الدورات</h1>

<div class="container">

  <!-- لغة الجسد -->
  <div class="card">
    <img src="body.png.PNG">
    <div class="card-content">
      <h2>لغة الجسد</h2>
      <p>اكتشف أسرار لغة الجسد واقرأ الآخرين بثقة</p>
      <a href="#" class="btn">عرض التفاصيل</a>
    </div>
  </div>

  <!-- تحليل الشخصيات -->
  <div class="card">
    <img src="analysis.png.PNG">
    <div class="card-content">
      <h2>تحليل الشخصيات</h2>
      <p>افهم شخصيات الآخرين من خلال تحليل الخط والتوقيع</p>
      <a href="#" class="btn">عرض التفاصيل</a>
    </div>
  </div>

</div>

<!-- جلسات التوجيه -->
<div class="section-title">جلسات التوجيه</div>

<div class="session-box">
  <img src="sessions.png">
  <p>جلسات توجيه خاصة تساعدك على تحقيق التوازن والوضوح</p>
</div>

<!-- واتساب -->
<a class="whatsapp" href="https://wa.me/966XXXXXXXXX">
واتساب
</a>

</body>
</html>
