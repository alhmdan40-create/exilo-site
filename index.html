<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #0e2a47;
    color: white;
}

/* البنر */
.banner img {
    width: 100%;
}

/* عنوان */
h2 {
    text-align: center;
    color: #d4af37;
    margin: 30px 0;
    font-size: 28px;
}

/* مربعات */
.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: linear-gradient(135deg,#d4af37,#f5e6a6);
    color: #000;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
}

/* الخط */
.line {
    height: 1px;
    background: #d4af37;
    margin: 40px 20px;
    opacity: 0.4;
}

/* الأقسام */
.section {
    padding: 20px;
}

.section img {
    width: 100%;
    border-radius: 20px;
}

.section h3 {
    text-align: center;
    color: #d4af37;
}

.section p {
    text-align: center;
}

/* زر القائمة */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    z-index: 999;
}

/* القائمة */
.sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: #0e2a47;
    padding: 20px;
    transition: 0.3s;
    z-index: 1000;
}

.sidebar.active {
    right: 0;
}

.close-btn {
    font-size: 22px;
    cursor: pointer;
}

.sidebar a {
    display: block;
    color: white;
    margin: 15px 0;
    text-decoration: none;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="menu">
<div class="close-btn" onclick="closeMenu()">✕</div>

<a href="index.html">الرئيسية</a>
<a href="courses.html">الدورات</a>
<a href="books.html">الكتب</a>
<a href="terms.html">الشروط</a>

</div>

<!-- البنر -->
<div class="banner">
<img src="banner-new.png.PNG">
</div>

<h2>لماذا إكسيلو؟</h2>

<div class="grid">
<div class="card">🚀 نصنع تحول حقيقي</div>
<div class="card">🧠 فهم عميق لذاتك</div>
<div class="card">🎯 وضوح في حياتك</div>
<div class="card">🔥 تغيير فعلي</div>
</div>

<div class="line"></div>

<!-- قسم الجلسات -->
<div class="section">
<img src="sessions.png">
<h3>الجلسات</h3>
<p>مو كل أحد يفهمك... هنا تبدأ أول خطوة</p>
</div>

<!-- قسم الدورات -->
<div class="section">
<img src="courses.png">
<h3>الدورات</h3>
<p>تعلم أدوات تغير حياتك فعليًا</p>
</div>

<script>

function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

</script>

</body>
</html>
