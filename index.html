:root { --navy:#050a14; --gold:#c5a059; --text:#e6f1ff; --dark-grey:#0a0f1a; }

* { box-sizing:border-box; }

body {
  font-family:'Tajawal',sans-serif;
  background-color:var(--navy);
  color:var(--text);
  margin:0;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* الهيدر */
header {
  background:var(--navy);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;

}

.logo-text { color:var(--gold); font-size:1.5rem; font-weight:bold; }

.login-btn {
  background:var(--gold);
  color:var(--navy);
  padding:8px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* المستخدم */
#userBox {
  color:var(--gold);
  font-weight:bold;
  margin-left:10px;
}

#logoutBtn {
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* البنر */
.hero {
  width:100%;
  height:350px;
  background:url('banner.png%202.PNG?v=100') center/cover no-repeat;
  border-bottom:4px solid var(--gold);
}
