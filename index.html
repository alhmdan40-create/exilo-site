<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0b1e3a, #142f55);
  color: white;
}

.hero img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.section-title {
  text-align: center;
  margin: 40px 0 20px;
  font-size: 28px;
  color: #d4af37;
  font-weight: 900;
}

.products {
  display: grid;
  gap: 20px;
  padding: 20px;
}

.product {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
  text-align: center;
}

.product img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.product-content {
  padding: 20px;
}

.btn {
  display: inline-block;
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  color: black;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

</style>
</head>

<body>

<section class="hero">
  <img src="banner.png.PNG">
</section>

<div class="section-title">الدورات والخدمات</div>

<div class="products">

  <div class="product">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="product-content">
      <h3>دورة تحليل الشخصية</h3>
      <p>تحليل الخط والتوقيع والرسومات</p>
      <a href="course1.html" class="btn">عرض التفاصيل</a>
    </div>
  </div>

  <div class="product">
    <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">
    <div class="product-content">
      <h3>دورة لغة الجسد</h3>
      <p>فهم الإشارات الجسدية والتواصل</p>
      <a href="course2.html" class="btn">عرض التفاصيل</a>
    </div>
  </div>

</div>

</body>
</html>
