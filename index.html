<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  height: auto;
  display: block;
}

/* القسم */
.section {
  padding: 40px 15px;
  max-width: 900px;
  margin: auto;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 28px;
  margin-bottom: 30px;
  font-weight: 700;
}

/* الكروت */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

/* الكارد الأساسي */
.card {
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  color: white;

  border: 1px solid rgba(242, 201, 76, 0.4);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);

  transition: all 0.4s ease;

  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.8s ease forwards;
}

/* ألوان مختلفة 🔥 */
.card:nth-child(1) {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
}
.card:nth-child(2) {
  background: linear-gradient(135deg, #42275a, #734b6d);
}
.card:nth-child(3) {
  background: linear-gradient(135deg, #134e5e, #71b280);
}
.card:nth-child(4) {
  background: linear-gradient(135deg, #2c3e50, #4ca1af);
}

/* حركة */
.card:hover {
  transform: translateY(-10px) scale(1.04);
  box-shadow: 0 20px 40px rgba(0,0,0,0.9);
}

/* تأخير الحركة */
.card:nth-child(1){animation-delay:0.2s;}
.card:nth-child(2){animation-delay:0.4s;}
.card:nth-child(3){animation-delay:0.6s;}
.card:nth-child(4){animation-delay:0.8s;}

/* الأيقونة */
.icon {
  font-size: 34px;
  margin-bottom: 12px;
}

/* النص */
.text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.7;
}

/* انيميشن */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* الجوال */
@media (max-width: 600px) {
  .cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG?v=50">
</div>

<!-- لماذا إكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
