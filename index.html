<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- 🔥 كود منع الكاش (مهم جدًا) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO | إكسيلو</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0b1d3a;
  color: white;
}

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #f2c94c;
  color: black;
  width: 55px;
  height: 55px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 1000;
  cursor: pointer;
}

/* القائمة الجانبية */
#menu {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  z-index: 999;
}

#menu a {
  display: block;
  color: white;
  margin: 15px 0;
  text-decoration: none;
}

/* البنر */
.banner {
  position: relative;
}

.banner img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  color: #f2c94c;
  font-size: 28px;
  font-weight: bold;
}

.hero-title {
  font-size: 24px;
  margin-top: 10px;
}

.hero-sub {
  font-size: 16px;
  opacity: 0.8;
}

/* العنوان */
.section-title {
  text-align: center;
  margin: 30px 0;
  color: #f2c94c;
  font-size: 22px;
}

/* الكروت */
.features {
  display: grid;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e2a44;
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #24365a;
}

.icon {
  font-size: 28px;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- القائمة -->
<div id="menu">
  <a href="#">الرئيسية</a>
  <a href="#">تحليل الشخصية</a>
  <a href="#">الجلسات</a>
  <a href="#">الشروط والأحكام</a>
</div>

<!-- البنر -->
<div class="banner">
  <!-- 🔥 v=2 مهم لتحديث الصورة -->
  <img src="banner-top.png.PNG?v=1">

  <div class="overlay">
    <div class="logo">EXILO | إكسيلو</div>
    <div class="hero-title">تحرر وابدأ من جديد</div>
    <div class="hero-sub">رحلة التوازن الحقيقي تبدأ من هنا</div>
  </div>
</div>

<!-- لماذا اكسيلو -->
<div class="section-title">لماذا إكسيلو؟</div>

<div class="features">

  <div class="card">
    <div class="icon">🚀</div>
    <div>لا نقدم معلومات... بل نصنع تحول حقيقي</div>
  </div>

  <div class="card">
    <div class="icon">🧠</div>
    <div>اكتشف أنماطك وسلوكك بعمق</div>
  </div>

  <div class="card">
    <div class="icon">🎯</div>
    <div>انتقل من التشتت إلى الوضوح</div>
  </div>

  <div class="card">
    <div class="icon">🔥</div>
    <div>التغيير يبدأ بالفعل وليس بالكلام</div>
  </div>

</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  if (menu.style.right === "0px") {
    menu.style.right = "-250px";
  } else {
    menu.style.right = "0px";
  }
}
</script>

</body>
</html>
