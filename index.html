<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --navy: #050a14;
    --gold: #c5a059;
    --text: #e6f1ff;
    --dark-grey: #0a0f1a;
    --card-bg: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; transition: all 0.3s ease; }

body {
    font-family: 'Tajawal', sans-serif;
    background-color: var(--navy);
    color: var(--text);
    margin: 0;
}

/* 🔥 تحسين القائمة */
#sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: linear-gradient(180deg,#050a14,#0a0f1a);
    padding: 30px 20px;
    z-index: 2000;
    border-left: 2px solid var(--gold);
}

#sidebar a {
    display: block;
    color: var(--text);
    margin: 18px 0;
    text-decoration: none;
    font-size: 1.05rem;
}

.menu-title {
    cursor: pointer;
    margin: 18px 0;
    font-weight: bold;
}

/* 🔥 أنيميشن */
.submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    padding-right: 15px;
}

#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:1500;
}

header {
    background: var(--navy);
    padding: 15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--gold);
}

.logout-btn {
    background: var(--gold);
    color: var(--navy);
    padding:7px 18px;
    border-radius:8px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    text-decoration:none;
}

.logo-text { color: var(--gold); font-weight:bold; }

.hero {
    height: 400px;
    background: linear-gradient(rgba(5,10,20,0.4), rgba(5,10,20,0.4)), url('banner.png%202.PNG');
    background-size: cover;
    background-position: center;
    border-bottom: 4px solid var(--gold);
}

.main-content { padding:60px 20px; }

/* باقي كودك بدون تغيير */
.why-section { max-width:1000px; margin:0 auto 60px; text-align:center; }
.why-section h2 { color:var(--gold); font-size:2.5rem; margin-bottom:40px; }

.why-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:25px; }

.why-card {
    background: rgba(255,255,255,0.04);
    border-radius:20px;
    border:1px solid rgba(197,160,89,0.3);
    padding:25px 20px;
    min-height:180px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.services-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:40px;
    max-width:1200px;
    margin:0 auto;
}

.service-card {
    background: var(--card-bg);
    border-radius:25px;
    padding:25px;
    text-align:center;
}

.image-container {
    height:280px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:20px;
}

.image-container img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.action-btn {
    background: var(--gold);
    color: var(--navy);
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    display:block;
}

footer {
    background: var(--dark-grey);
    padding:50px 20px;
    border-top:2px solid var(--gold);
    text-align:center;
}

.social-icons a {
    color: var(--gold);
    font-size: 2.2rem;
    margin: 0 20px;
}

.legal-links a {
    color: #8fa7c7;
    margin: 0 15px;
    text-decoration: none;
}
</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- 🔥 القائمة بعد التعديل -->
<div id="sidebar">

<div onclick="toggleSidebar()" style="color:var(--gold);font-size:22px;cursor:pointer;margin-bottom:20px;">✕</div>

<a href="index.html">🏠 الرئيسية</a>

<div class="menu-title" onclick="toggleMenu('coursesMenu')">🎓 الدورات ▾</div>
<div class="submenu" id="coursesMenu">
<a href="body-language-course.html">لغة الجسد</a>
<a href="character-analysis-course.html">تحليل الشخصيات</a>
</div>

<a href="sessions.html">💬 الجلسات</a>

<!-- 🔥 المتجر صار Dropdown -->
<div class="menu-title" onclick="toggleMenu('storeMenu')">🛒 المتجر ▾</div>
<div class="submenu" id="storeMenu">
<a href="exelo-store.html">📚 الكتب</a>
<a href="exelo-store.html">عرض المتجر</a>
</div>

<a href="reviews.html">⭐ آراء العملاء</a>

</div>

<header>
<div onclick="toggleSidebar()" style="cursor:pointer;">
<i class="fas fa-bars" style="color:gold;font-size:20px;"></i>
</div>

<div>
<button id="logoutBtn" class="logout-btn">خروج</button>
<a href="login.html" id="loginBtn" class="logout-btn" style="display:none;">تسجيل الدخول</a>
</div>

<div class="logo-text">EXILO</div>
</header>

<div class="hero"></div>

<main class="main-content">
<!-- باقي صفحتك كما هي بدون أي تغيير -->
</main>

<!-- الفوتر كما هو -->
<footer>
<div class="social-icons">
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-snapchat"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

<div class="legal-links">
<a href="terms.html">الشروط</a>
<a href="privacy.html">الخصوصية</a>
</div>

<p style="color:#5a718a;">© 2026 إكسيلو</p>
</footer>

<!-- 🔥 Firebase (لم ألمسه) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, (user) => {
    const logoutBtn = document.getElementById("logoutBtn");
    const loginBtn = document.getElementById("loginBtn");

    if (user) {
        logoutBtn.style.display = "inline-block";
        loginBtn.style.display = "none";
    } else {
        logoutBtn.style.display = "none";
        loginBtn.style.display = "inline-block";
    }
});

document.getElementById("logoutBtn").onclick = function () {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
};
</script>

<script>
function toggleSidebar(){
let s=document.getElementById("sidebar");
let o=document.getElementById("overlay");

if(s.style.right==="0px"){
s.style.right="-260px";
o.style.display="none";
}else{
s.style.right="0px";
o.style.display="block";
}
}

/* 🔥 أنيميشن احترافي */
function toggleMenu(id){
let menu=document.getElementById(id);

if(menu.style.maxHeight){
menu.style.maxHeight=null;
}else{
menu.style.maxHeight=menu.scrollHeight+"px";
}
}
</script>

</body>
</html>
