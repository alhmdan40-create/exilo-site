<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إكسيلو | EXILO</title>

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Cairo', sans-serif;
    background:#0f2747;
    color:white;
}

/* ===== البنر ===== */
.banner img{
    width:100%;
    border-radius:0 0 30px 30px;
}

/* ===== العنوان ===== */
h1{
    text-align:center;
    color:#d4af37;
    margin:30px 0;
}

/* ===== الأقسام ===== */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:linear-gradient(135deg,#d4af37,#f5e6a0);
    color:black;
    padding:30px;
    border-radius:20px;
    text-align:center;
    font-weight:700;
    font-size:18px;
}

/* ===== الفاصل ===== */
.line{
    width:80%;
    height:1px;
    background:#d4af37;
    margin:30px auto;
}

/* ===== القائمة ===== */
.menu-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:12px;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    z-index:1001;
}

/* القائمة الجانبية */
.sidebar{
    position:fixed;
    top:0;
    right:-260px; /* مخفية */
    width:260px;
    height:100%;
    background:#0b1f3a;
    transition:0.3s;
    padding:20px;
    z-index:1002;
}

/* لما تفتح */
.sidebar.active{
    right:0;
}

/* زر X */
.close-btn{
    font-size:25px;
    cursor:pointer;
    margin-bottom:20px;
    display:block;
}

/* روابط */
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    font-size:18px;
}

/* خلفية شفافة */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:1000;
}

.overlay.active{
    display:block;
}

/* ===== الجلسات ===== */
.sessions{
    text-align:center;
    padding:20px;
}

.sessions img{
    width:90%;
    border-radius:20px;
}

/* ===== الفوتر ===== */
.footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">
    <span class="close-btn" onclick="closeMenu()">✕</span>

    <a href="index.html">الرئيسية</a>
    <a href="courses.html">الدورات</a>
    <a href="books.html">الكتب</a>
    <a href="sessions.html">الجلسات</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- البنر -->
<div class="banner">
    <img src="banner-new.png.PNG">
</div>

<!-- العنوان -->
<h1>لماذا إكسيلو؟</h1>

<!-- الأقسام -->
<div class="grid">
    <div class="card">🧠 فهم عميق لذاتك</div>
    <div class="card">🚀 نصنع تحول حقيقي</div>
    <div class="card">🔥 تغيير فعلي</div>
    <div class="card">🎯 وضوح في حياتك</div>
</div>

<div class="line"></div>

<!-- الجلسات -->
<div class="sessions">
    <h1>الجلسات</h1>
    <p>ابدأ رحلتك نحو التوازن النفسي والتطوير الحقيقي</p>
    <img src="body.png.PNG">
</div>

<!-- الفوتر -->
<div class="footer">
    © جميع الحقوق محفوظة - إكسيلو
</div>

<script>

function openMenu(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
