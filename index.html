
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --gold: #b59410; --site-bg: #fbfcfd; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--site-bg); direction: rtl; }

        /* البانر نظيف تماماً */
        .banner-wrapper { position: relative; width: 100%; line-height: 0; border-bottom: 5px solid var(--gold); }
        .banner-img { width: 100%; height: auto; display: block; }
        .hide-text-mask { position: absolute; bottom: 0; left: 0; width: 100%; height: 15%; background-color: var(--site-bg); z-index: 5; }

        .content-container { max-width: 900px; margin: -60px auto 80px; padding: 0 20px; position: relative; z-index: 10; }
        .welcome-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; border-top: 6px solid var(--navy); }

        /* حاوية الشعار الذهبي الكامل */
        .logo-container { width: 160px; height: 160px; margin: 0 auto 20px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }

        .welcome-title { color: var(--navy); font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
        .welcome-desc { color: #555; font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; }
        .cta-btn { display: inline-block; background: var(--navy); color: white; padding: 18px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(10,25,47,0.2); }
    </style>
</head>
<body>
    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo" class="banner-img">
        <div class="hide-text-mask"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            <div class="logo-container">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 10 L170 45 L170 120 C170 160 100 190 100 190 C100 190 30 160 30 120 L30 45 Z" fill="none" stroke="#b59410" stroke-width="5"/>
                    <path d="M100 22 L158 52 L158 115 C158 150 100 175 100 175 C100 175 42 150 42 115 L42 52 Z" fill="none" stroke="#b59410" stroke-width="2"/>
                    
                    <path d="M60 60 L100 35 L140 60 L140 110 L100 135 L60 110 Z" fill="none" stroke="#b59410" stroke-width="2" opacity="0.6"/>
                    <path d="M45 110 Q100 150 155 110" fill="none" stroke="#b59410" stroke-width="1.5"/>
                    
                    <path d="M75 75 C75 75 130 75 130 75 L130 90 L95 90 C95 90 95 105 95 105 L125 105 L125 120 L95 120 C95 120 95 135 95 135 L130 135 L130 150 L75 150 Z" fill="#b59410"/>
                    
                    <path d="M30 45 L170 45 M100 10 L100 35" stroke="#b59410" stroke-width="1"/>
                </svg>
            </div>
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            <p class="welcome-desc">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>
</body>
</html>
