<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكسيلو | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy-deep: #050a14; 
            --gold: #c5a059; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            background-color: var(--navy-deep); 
            direction: rtl; 
            color: var(--white);
        }

        /* الربط مع الاسم الجديد للملف في جيت هوب */
        .hero-section {
            width: 100%;
            height: 450px;
            background: url('banner.png 2.PNG') center/cover no-repeat;
            border-bottom: 5px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { max-width: 1000px; margin: -80px auto 60px; padding: 0 20px; position: relative; z-index: 5; }

        .content-box { 
            background: rgba(13, 27, 53, 0.98); 
            padding: 50px 30px; 
            border-radius: 40px; 
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .title { color: var(--gold); font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; }
        .description { font-size: 1.2rem; line-height: 1.8; margin-bottom: 40px; opacity: 0.9; }

        .cta-button { 
            display: inline-block; 
            background: linear-gradient(45deg, var(--gold), #8e7033);
            color: #050a14; 
            padding: 20px 60px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.3rem;
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
        }
        .cta-button:hover { transform: scale(1.05); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 50px; }
        .product-item { 
            background: rgba(255,255,255,0.03); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .product-item h3 { color: var(--gold); margin-bottom: 20px; }
        .product-link { display: block; color: #fff; text-decoration: none; padding: 12px; margin-top: 8px; background: rgba(255,255,255,0.05); border-radius: 12px; transition: 0.3s; }
        .product-link:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="hero-section"></div>

    <div class="container">
        <div class="content-box">
            <h1 class="title">عالم إكسيلو الرقمي</h1>
            <p class="description">تحرر وابدأ من جديد.. التوازن يبدأ من هنا. نقدم لك أجود المنتجات الرقمية والجلسات الاستشارية بإشراف المدرب هاني آل حمدان.</p>
            
            <a href="https://wa.me/966503460060" class="cta-button">احجز جلستك الآن</a>

            <div class="products-grid">
                <div class="product-item">
                    <h3>الدورات</h3>
                    <a href="#" class="product-link">تطوير الذات</a>
                    <a href="#" class="product-link">مهارات التدريب</a>
                </div>
                <div class="product-item">
                    <h3>الجلسات</h3>
                    <a href="#" class="product-link">استشارات خاصة</a>
                    <a href="#" class="product-link">استرخاء وتنويم</a>
                </div>
                <div class="product-item">
                    <h3>الكتب</h3>
                    <a href="#" class="product-link">كتب رقمية PDF</a>
                    <a href="#" class="product-link">حقائب تدريبية</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
