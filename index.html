<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --site-bg: #fbfcfd;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            background-color: var(--site-bg);
            direction: rtl;
        }

        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* الشعار البرمجي فوق البنر */
        .banner-logo-svg {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 60px;
            height: 60px;
            z-index: 20;
        }

        .hide-text-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background-color: var(--site-bg);
            z-index: 5;
        }

        .content-container {
            max-width: 900px;
            margin: -40px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        /* تنسيق الشعار البرمجي في المربع الأبيض */
        .main-logo-svg {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: block;
        }

        .welcome-title {
            color: var(--navy);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .welcome-desc {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 18px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(10,25,47,0.2);
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <div class="banner-logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 20H80V35H35V45H70V60H35V65H80V80H20V20Z" fill="#b59410"/>
                <rect x="10" y="10" width="80" height="80" rx="10" stroke="#b59410" stroke-width="4"/>
            </svg>
        </div>
        
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
        <div class="hide-text-mask"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            
            <div class="main-logo-svg">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M25 25H75V35H40V45H65V55H40V65H75V75H25V25Z" fill="#b59410"/>
                    <rect x="10" y="10" width="80" height="80" rx="15" stroke="#0a192f" stroke-width="3"/>
                    <rect x="5" y="5" width="90" height="90" rx="20" stroke="#b59410" stroke-width="1"/>
                </svg>
            </div>
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            <p class="welcome-desc">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
