<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root{
--navy:#050a14;
--gold:#c5a059;
--text:#e6f1ff;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:var(--navy);
color:var(--text);
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:2px solid var(--gold);
}

.logo-text{color:var(--gold);font-size:1.5rem;font-weight:bold;}

.user-section{display:flex;align-items:center;gap:10px;}

.logout-btn{
background:var(--gold);
border:none;
padding:6px 15px;
border-radius:8px;
cursor:pointer;
}

/* القائمة الجانبية */
.sidebar{
position:fixed;
right:-260px;
top:0;
width:250px;
height:100%;
background:#0a0f1a;
padding:20px;
transition:.3s;
z-index:999;
}
.sidebar.active{right:0;}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
}
.overlay.active{display:block;}

.sidebar a{
display:block;
margin:15px 0;
color:#fff;
text-decoration:none;
}

/* البنر */
.hero{
height:300px;
background:url('banner.png 2.PNG?v=5') center/cover no-repeat;
border-bottom:3px solid var(--gold);
}

/* الكروت */
.container{padding:40px 20px;}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
margin-bottom:30px;
text-align:center;
}

.card img{
width:100%;
border-radius:15px;
}

.btn{
display:block;
background:var(--gold);
color:#000;
padding:12px;
border-radius:10px;
margin-top:15px;
text-decoration:none;
}

/* الفوتر */
.footer {
background: #050a14;
padding: 40px 20px 60px;
text-align: center;
}

.footer-line {
width: 100%;
height: 2px;
background: #c5a059;
margin-bottom: 30px;
}

.footer-icons {
display: flex;
justify-content: center;
gap: 40px;
margin-bottom: 25px;
}

.footer-icons a {
color: #c5a059;
font-size: 32px;
}

.footer-links {
margin-bottom: 20px;
color: #8fa7c7;
}

.footer-links a {
color: #8fa7c7;
text-decoration: none;
margin: 0 10px;
}

.footer-links span {
color: #c5a059;
}

.footer-copy {
color: #6f859e;
font-size: 14px;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header>
<i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer;color:var(--gold)"></i>

<div class="user-section">
<button class="logout-btn" onclick="logout()">خروج</button>
<span id="userEmail"></span>
<i class="fas fa-user-circle" style="color:var(--gold)"></i>
</div>

<div class="logo-text">EXILO</div>
</header>

<div class="sidebar" id="sidebar">
<a href="#">الرئيسية</a>
<a href="courses-details.html">الدورات</a>
<a href="exelo-store.html">المتجر</a>
</div>

<div class="hero"></div>

<div class="container">

<div class="card">
<img src="sessions.png.PNG?v=5">
<h2>الجلسات</h2>
<a href="https://wa.me/966538205304" class="btn">احجز</a>
</div>

<div class="card">
<img src="store.png.jpg?v=5">
<h2>المتجر الرقمي</h2>
<a href="exelo-store.html" class="btn">تصفح</a>
</div>

</div>

<!-- الفوتر -->
<footer class="footer">

<div class="footer-line"></div>

<div class="footer-icons">
<a href="https://wa.me/966538205304"><i class="fab fa-whatsapp"></i></a>
<a href="https://www.snapchat.com/add/hanialhmdan"><i class="fab fa-snapchat"></i></a>
<a href="https://www.tiktok.com/@hanialhmdan"><i class="fab fa-tiktok"></i></a>
</div>

<div class="footer-links">
<a href="terms.html">الشروط والأحكام</a>
<span>|</span>
<a href="privacy.html">سياسة الخصوصية</a>
</div>

<div class="footer-copy">
© 2026 إكسيلو | جميع الحقوق محفوظة لـ هاني آل حمدان
</div>

</footer>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnlu9c0Dzo",
authDomain: "exilo-376f1.firebaseapp.com",
projectId: "exilo-376f1",
storageBucket: "exilo-376f1.appspot.com",
messagingSenderId: "736619072060",
appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("userEmail").textContent=user.email;
}else{
window.location.href="login.html";
}
});

window.logout=function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
};
</script>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
