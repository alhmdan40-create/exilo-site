<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family:sans-serif;
  background:#0f1f3a;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: gold;
  color: black;
  width: 55px;
  height: 55px;
  border-radius: 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:2000;
}

/* الخلفية */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:1500;
}

.overlay.active {
  opacity:1;
  visibility:visible;
}

/* القائمة */
.sidebar {
  position: fixed;
  top:0;
  right:-270px;
  width:270px;
  height:100%;
  background:#162a4d;
  padding:20px;
  transition:0.3s;
  z-index:2001;
}

.sidebar.active {
  right:0;
}

.sidebar h2 {
  color:gold;
}

.sidebar a {
  display:block;
  margin:12px 0;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:white;
  text-decoration:none;
}

/* المحتوى */
.container {
  padding:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  margin:20px auto;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

.btn {
  background:gold;
  color:black;
  padding:12px 25px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
}

h1 {
  color:gold;
}

</style>
</head>

<body>

<!-- زر -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- الخلفية -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">

<h2>EXILO</h2>

<a href="#">تسجيل الدخول</a>
<a href="#">تحليل الشخصيات</a>
<a href="#">لغة الجسد</a>
<a href="#">الكتب</a>
<a href="#">الجلسات</a>
<a href="#">الشروط</a>

</div>

<!-- المحتوى -->
<div class="container">

<h1>الدورات</h1>

<div class="card">
<h3>تحليل الشخصيات</h3>
<a class="btn">عرض</a>
</div>

<div class="card">
<h3>لغة الجسد</h3>
<a class="btn">عرض</a>
</div>

<h1>المنتجات</h1>

<div class="card">
<h3>الكتب</h3>
<a class="btn">عرض</a>
</div>

<div class="card">
<h3>الجلسات</h3>
<a class="btn">عرض</a>
</div>

</div>

<script>

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
