<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0b1d3a;
}

/* البنر */
.banner {
  position: relative;
}

.banner img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* طبقة فوق البنر */
.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);

  display: flex;
  justify-content: center;
  align-items: center;
}

/* النص */
.logo {
  color: #f2c94c;
  font-size: 36px;
  font-weight: bold;
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">

  <img src="banner-top.png.PNG?v=2">

  <div class="overlay">
    <div class="logo">EXILO | إكسيلو</div>
  </div>

</div>

</body>
</html>
