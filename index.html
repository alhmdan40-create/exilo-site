<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(#0f1f3a,#162a4d);
color:white;
text-align:center;
}

/* زر القائمة */
.menu-btn{
position:fixed;
top:20px;
right:20px;
background:gold;
color:black;
width:55px;
height:55px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
font-size:22px;
}

/* البنر */
.banner{
position:relative;
height:300px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* طبقة داكنة */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* النص */
.logo{
color:gold;
font-size:42px;
font-weight:900;
}

.hero-title{
font-size:28px;
font-weight:900;
margin-top:10px;
}

.hero-sub{
font-size:16px;
opacity:0.9;
}

/* العناوين */
.title{
color:gold;
font-size:30px;
margin:40px 0 20px;
font-weight:900;
}

/* مربعات */
.box{
background:rgba(255,255,255,0.05);
margin:12px;
padding:18px;
border-radius:15px;
font-size:17px;
}

/* الكروت */
.card{
background:rgba(255,255,255,0.05);
margin:20px;
padding:20px;
border-radius:20px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
}

.card h3{
font-size:22px;
margin:15px 0;
}

.btn{
background:gold;
color:black;
padding:12px 25px;
border-radius:10px;
display:inline-block;
margin-top:10px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="menu-btn">☰</div>

<!-- البنر (الجديد فقط) -->
<div class="banner">
<img src="banner-top.png.PNG">

<div class="overlay">
<div class="logo">EXILO</div>

<div class="hero-title">
تحرّر… وابدأ من جديد
</div>

<div class="hero-sub">
رحلة التوازن الحقيقي تبدأ من هنا
</div>

</div>
</div>

<!-- لماذا اكسيلو -->
<div class="title">لماذا إكسيلو؟</div>

<div class="box">🚀 لا نقدم معلومات… بل نصنع تحول حقيقي</div>
<div class="box">🧠 اكتشف أنماطك وسلوكك بعمق</div>
<div class="box">🎯 انتقل من التشتت إلى الوضوح</div>
<div class="box">🔥 التغيير يبدأ بالفعل وليس بالكلام</div>

<!-- الدورات -->
<div class="title">الدورات</div>

<div class="card">
<img src="analysis.png.PNG">
<h3>تحليل الشخصيات</h3>
<a href="course-analysis.html" class="btn">عرض</a>
</div>

<div class="card">
<img src="body.png.PNG">
<h3>لغة الجسد</h3>
<a href="course-body.html" class="btn">عرض</a>
</div>

<!-- المنتجات -->
<div class="title">المنتجات</div>

<div class="card">
<img src="books.png.jpg">
<h3>الكتب</h3>
<a href="books.html" class="btn">عرض</a>
</div>

<div class="card">
<img src="sessions.png.PNG">
<h3>الجلسات</h3>
<a href="sessions.html" class="btn">عرض</a>
</div>

</body>
</html>
