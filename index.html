<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

        .cta-btn { display: inline-block; background: var(--navy); color: white; padding: 16px 45px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
    </div>
    <div class="content-container">
        <section class="welcome-box">
            <h2 style="color: var(--navy);">مرحباً بك في عالم إكسيلو</h2>

            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>
</body>
</html>
