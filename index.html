<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#0f2747;
    color:white;
    overflow-x:hidden;
}

/* البنر */
.banner img{
    width:100%;
    display:block;
}

/* العنوان */
h1{
    text-align:center;
    color:#d4af37;
    margin:30px 0;
}

/* الشبكة */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:15px;
    width:100%;
    box-sizing:border-box;
}

/* المربعات */
.card{
    background:linear-gradient(135deg,#d4af37,#f5e6a0);
    color:black;
    padding:18px;
    border-radius:16px;
    text-align:center;
    font-weight:800;
    font-size:16px;
    min-height:110px;

    display:flex;
    align-items:center;
    justify-content:center;

    line-height:1.6;
}

/* القائمة */
.menu-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.6);
    padding:12px;
    border-radius:12px;
    z-index:1001;
    cursor:pointer;
}

/* القائمة الجانبية */
.sidebar{
    position:fixed;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:#0b1f3a;
    padding:20px;
    transition:0.3s;
    z-index:1002;
}

.sidebar.active{
    right:0;
}

.close{
    font-size:25px;
    cursor:pointer;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
}

/* الخلفية */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:1000;
}

.overlay.active{
    display:block;
}

/* الجلسات */
.sessions{
    text-align:center;
    padding:20px;
}

.sessions img{
    width:90%;
    border-radius:20px;
}

/* الفوتر */
.footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="menu">
    <div class="close" onclick="closeMenu()">✕</div>
    <a href="index.html">الرئيسية</a>
    <a href="courses.html">الدورات</a>
    <a href="sessions.html">الجلسات</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- البنر -->
<div class="banner">
    <img src="banner-new.png.PNG">
</div>

<h1>لماذا إكسيلو؟</h1>

<div class="grid">
    <div class="card">🚀 نصنع تحول حقيقي في حياتك</div>
    <div class="card">🧠 نمنحك فهم عميق لنفسك والآخرين</div>
    <div class="card">🎯 نساعدك توضح مسارك وتحقق أهدافك</div>
    <div class="card">🔥 نوصلك لمرحلة التغيير الحقيقي</div>
</div>

<!-- الجلسات -->
<div class="sessions">
    <h1>الجلسات</h1>
    <p>ابدأ رحلتك نحو التوازن النفسي والتطوير الحقيقي</p>
    <img src="body.png.PNG">
</div>

<div class="footer">
© جميع الحقوق محفوظة - إكسيلو
</div>

<script>

function openMenu(){
    document.getElementById("menu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
