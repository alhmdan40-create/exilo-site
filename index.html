<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #0e2a47;
    color: white;
}

/* البنر */
.banner img {
    width: 100%;
    display: block;
}

/* العنوان */
h2 {
    text-align: center;
    color: #d4af37;
    margin: 30px 0;
    font-size: 28px;
    font-weight: 900;
}

/* المربعات */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: linear-gradient(135deg, #d4af37, #f5e6a6);
    color: #000;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* زر القائمة */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 3000;
}

/* الخلفية السوداء */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 2000;
}

/* القائمة */
.sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: #0e2a47;
    padding: 20px;
    transition: 0.3s;
    z-index: 3001;
}

.sidebar.active {
    right: 0;
}

/* زر الإغلاق */
.close-btn {
    font-size: 24px;
    cursor: pointer;
    margin-bottom: 20px;
}

/* روابط */
.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 15px 0;
    font-size: 16px;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- الخلفية -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- القائمة -->
<div class="sidebar" id="menu">

<div class="close-btn" onclick="closeMenu()">✕</div>

<a href="index.html">الرئيسية</a>
<a href="courses.html">الدورات</a>
<a href="books.html">الكتب</a>
<a href="terms.html">الشروط والأحكام</a>

</div>

<!-- البنر -->
<div class="banner">
<img src="banner-new.png.PNG">
</div>

<h2>لماذا إكسيلو؟</h2>

<div class="grid">

<a href="courses.html" class="card">🚀 نصنع تحول حقيقي</a>
<a href="courses.html" class="card">🧠 فهم عميق لذاتك</a>
<a href="courses.html" class="card">🎯 وضوح في حياتك</a>
<a href="courses.html" class="card">🔥 تغيير فعلي</a>

</div>

<script>

function openMenu() {
    document.getElementById("menu").classList.add("active");
    document.getElementById("overlay").style.display = "block";
}

function closeMenu() {
    document.getElementById("menu").classList.remove("active");
    document.getElementById("overlay").style.display = "none";
}

</script>

</body>
</html>
