<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --site-bg: #fbfcfd;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            background-color: var(--site-bg);
            direction: rtl;
        }

        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* الطبقة التي ستمسح اللوجو القديم (الموجود في أعلى اليمين) */
        .eraser-layer {
            position: absolute;
            top: 5%;
            right: 0;
            width: 30%; /* مساحة كافية لتغطية اللوجو القديم */
            height: 25%;
            background: linear-gradient(to left, var(--navy), rgba(10, 25, 47, 0.8));
            z-index: 5;
        }

        /* وضع الشعار الذهبي الجديد (E) فوق منطقة المسح */
        .new-logo-overlay {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .hide-text-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18%;
            background-color: var(--site-bg);
            z-index: 6;
        }

        .content-container {
            max-width: 900px;
            margin: -60px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 15;
        }

        .welcome-box {
            background: white;
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 6px solid var(--navy);
        }

        .main-logo-svg {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
        }

        .welcome-title {
            color: var(--navy);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .welcome-desc {
            color: #4a4a4a;
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(10,25,47,0.2);
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <div class="eraser-layer"></div>
        <div class="hide-text-mask"></div>

        <div class="new-logo-overlay">
            <svg width="70" height="70" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#b59410" stroke-width="2"/>
                <path d="M35 35H65V42H45V46H60V53H45V57H65V65H35V35Z" fill="#b59410"/>
            </svg>
        </div>
        
        <img src="banner-top.png.PNG" alt="Banner" class="banner-img">
    </div>

    <div class="container">
        <div class="content-container">
            <section class="welcome-box">
                <div class="main-logo-svg">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" fill="var(--navy)"/>
                        <path d="M35 35H65V42H45V46H60V53H45V57H65V65H35V35Z" fill="#b59410"/>
                    </svg>
                </div>
                
                <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
                <p class="welcome-desc">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان.</p>
                <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
            </section>
        </div>
    </div>

</body>
</html>
