<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

/* القسم */
.section {
  padding: 40px 20px;
  background: #0b1d3a;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 24px;
  margin-bottom: 30px;
  font-weight: bold;
}

/* الكروت */
.cards {
  display: grid;
  gap: 20px;
}

/* الكرت */
.card {
  background: #1e2a44;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

/* الأيقونة */
.icon {
  font-size: 28px;
  margin-bottom: 10px;
}

/* النص */
.text {
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG?v=99">
</div>

<!-- لماذا إكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
