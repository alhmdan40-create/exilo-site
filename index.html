<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

/* ===== الأساس ===== */
body {
  margin: 0;
  font-family: 'Tahoma', sans-serif;
  background: #0b1a2b;
  color: white;
}

/* ===== الهيدر (فارغ) ===== */
header {
  height: 60px;
  background: #081420;
}

/* ===== البنر ===== */
.hero {
  height: 220px;
  overflow: hidden;
  border-bottom: 2px solid #d4af37;
}

.hero-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== العناوين ===== */
.section-title {
  text-align: center;
  color: #d4af37;
  margin: 30px 0 15px;
  font-size: 24px;
}

/* ===== الكروت ===== */
.card {
  background: #16273d;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.price {
  margin: 10px 0;
  font-size: 18px;
}

/* ===== الأزرار ===== */
.btn {
  background: #d4af37;
  color: black;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

/* ===== الدفع ===== */
.payment {
  background: #16273d;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.payment img {
  width: 80px;
  margin: 10px;
}

/* ===== واتساب ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 30px;
  text-decoration: none;
}

/* ===== الفوتر ===== */
footer {
  text-align: center;
  padding: 15px;
  font-size: 12px;
  color: #ccc;
}

</style>
</head>

<body>

<!-- ===== الهيدر ===== -->
<header></header>

<!-- ===== البنر (بدون نص) ===== -->
<section class="hero">
  <img src="banner-top.png.PNG" class="hero-bg">
</section>

<!-- ===== الدورات ===== -->
<h2 class="section-title">الدورات المتاحة</h2>

<div class="card">
  <h3>دورة تحليل الشخصية</h3>
  <p>تحليل الخط والتوقيع والرسومات</p>
  <div class="price">149 ريال</div>
  <a href="#" class="btn">شراء الآن</a>
</div>

<div class="card">
  <h3>جلسات كوتشينج</h3>
  <p>جلسات تدريبية مباشرة</p>
  <div class="price">200 ريال</div>
  <a href="#" class="btn">احجز الآن</a>
</div>

<!-- ===== الدفع ===== -->
<div class="payment">
  <h3>🔒 ادفع بثقة وأمان</h3>
  <p>نقبل الدفع عبر Apple Pay و مدى</p>

  <!-- تأكد من رفع الصور -->
  <img src="mada.png">
  <img src="apple.png">
</div>

<!-- ===== واتساب ===== -->
<a href="https://wa.me/966530205304" class="whatsapp">
  واتساب
</a>

<!-- ===== الفوتر ===== -->
<footer>
© 2026 EXILO. جميع الحقوق محفوظة. هذا الموقع وجميع محتوياته محمية بموجب حقوق النشر.
</footer>

</body>
</html>
