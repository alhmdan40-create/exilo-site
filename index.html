<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو | المدرب هاني آل حمدان</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --site-bg: #fbfcfd;
        }

        body {
            /* تطبيق الخط الاحترافي على كامل الصفحة */
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--site-bg);
            direction: rtl;
            overflow-x: hidden;
            color: #333;
        }

        /* حاوية البانر */
        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* طبقة الإخفاء السفلى لضمان عدم ظهور النص المزعج */
        .hide-text-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; /* مساحة كافية للتغطية */
            background-color: var(--site-bg);
            z-index: 5;
        }

        /* مساحة المحتوى */
        .content-container {
            max-width: 900px;
            margin: -40px auto 80px; /* تداخل خفيف مع البانر */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* بطاقة الترحيب المطورة */
        .welcome-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); /* ظل أعمق وأفخم */
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        /* --- تنسيق اللوجو بشكل ملفت --- */
        .logo-prominent {
            height: 80px; /* حجم أكبر وملفت */
            width: auto;
            margin: 0 auto 30px;
            display: block;
            /* إضافة ظل ناعم للشعار ليعطيه عمقاً */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* --- تنسيق عبارة الترحيب بخط ملفت --- */
        .welcome-title {
            color: var(--navy);
            font-size: 2.5rem; /* حجم كبير وملفت */
            font-weight: 700; /* عريض جداً */
            margin: 0 0 20px 0;
            line-height: 1.2;
            letter-spacing: -1px; /* تضييق المسافات يعطي طابعاً عصرياً */
        }

        /* --- تنسيق الوصف بخط احترافي --- */
        .welcome-desc {
            color: #555;
            font-size: 1.2rem; /* حجم مريح ومقروء */
            font-weight: 400;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        /* تنسيق الزر */
        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(10,25,47,0.2);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(10,25,47,0.3);
            background-color: #112a4f;
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .content-container { margin-top: -20px; }
            .welcome-box { padding: 30px 20px; }
            .logo-prominent { height: 60px; margin-bottom: 20px; }
            .welcome-title { font-size: 1.8rem; }
            .welcome-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
        <div class="hide-text-mask"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            
            <img src="logo.png.PNG" alt="Exilo Logo" class="logo-prominent">
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            
            <p class="welcome-desc">
                بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.
            </p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
