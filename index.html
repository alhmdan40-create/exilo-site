<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
}

/* القسم */
.section {
  padding: 40px 20px;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 28px;
  margin-bottom: 30px;
}

/* لماذا اكسيلو */
.cards {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

.card {
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  color: white;
  font-weight: bold;
}

/* الخدمات */
.services {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.service {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
}

.service img {
  width: 100%;
  height: 230px;
  object-fit: cover;
}

.service-title {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
  color: #f2c94c;
  padding: 15px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  font-weight: bold;
}

/* كمبيوتر */
@media (min-width:700px){
  .services{
    grid-template-columns: repeat(3,1fr);
  }
}

</style>

</head>

<body>

<!-- 🔥 البنر -->
<div class="banner">
  <img src="banner-top.png.PNG">
</div>

<!-- 🔥 لماذا اكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">🚀 نصنع تحول حقيقي</div>
    <div class="card">🧠 فهم عميق لذاتك</div>
    <div class="card">🎯 وضوح في حياتك</div>
    <div class="card">🔥 تغيير فعلي</div>

  </div>

</div>

<!-- 🔥 الخدمات -->
<div class="section">

  <div class="title">الخدمات</div>

  <div class="services">

    <!-- جلسات -->
    <a href="sessions.html" class="service">
      <img src="sessions.png.PNG">
      <div class="service-title">الجلسات</div>
    </a>

    <!-- دورات -->
    <a href="courses.html" class="service">
      <img src="courses.png.jpg">
      <div class="service-title">الدورات</div>
    </a>

    <!-- كتب -->
    <a href="books.html" class="service">
      <img src="books.png.jpg">
      <div class="service-title">الكتب</div>
    </a>

  </div>

</div>

</body>
</html>
