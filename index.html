<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --site-bg: #fbfcfd; /* لون خلفية الموقع */
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--site-bg);
            direction: rtl;
            overflow-x: hidden;
        }

        /* حاوية البانر */
        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* الشريط السحري لإخفاء عبارة المدرب نهائياً */
        .hide-text-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18%; /* مساحة كافية لتغطية السطر السفلي تماماً */
            background-color: var(--site-bg); /* نفس لون خلفية الموقع للمسح */
            z-index: 5;
        }

        .content-container {
            max-width: 1000px;
            margin: 20px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
        <div class="hide-text-mask"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            <h2 style="color: var(--navy);">مرحباً بك في عالم إكسيلو</h2>
            <p style="color: #555;">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
