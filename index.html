<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكسيلو | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy-deep: #050a14; 
            --gold: #c5a059; 
            --text-light: #e6f1ff; 
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            background-color: var(--navy-deep); 
            color: var(--text-light);
            direction: rtl; 
        }

        /* هذا هو البنر المبرمج - سيظهر فوراً بدون ملف صورة */
        .hero-banner {
            width: 100%;
            height: 400px;
            /* تدرج لوني يحاكي ألوان البحر والغروب في الصورة التي اخترتها */
            background: linear-gradient(180deg, #1a3a5f 0%, #050a14 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--gold);
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        /* إضافة لمسة جمالية تشبه الأمواج أو الجبال خلف الشعار */
        .hero-banner::before {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
        }

        .logo-svg { 
            width: 150px; 
            height: 150px; 
            z-index: 5; 
            filter: drop-shadow(0 0 20px rgba(197,160,89,0.5));
        }

        .container { max-width: 900px; margin: -80px auto 60px; padding: 0 20px; position: relative; z-index: 10; }

        .welcome-box { 
            background: #0d1b35; 
            padding: 50px 30px; 
            border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .title { color: var(--gold); font-size: 2.5rem; margin-bottom: 20px; }
        .desc { font-size: 1.2rem; line-height: 1.8; opacity: 0.9; margin-bottom: 40px; }

        .btn-gold { 
            display: inline-block; 
            background: linear-gradient(45deg, var(--gold), #8e7033);
            color: #050a14; 
            padding: 18px 60px; 
            border-radius: 60px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.3rem;
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.4);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 50px; }
        .card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .card h3 { color: var(--gold); margin-bottom: 15px; }
        .card-link { display: block; color: #fff; text-decoration: none; padding: 10px; margin-top: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hero-banner">
        <div class="logo-svg">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 20 L175 55 L175 125 C175 170 100 195 100 195 C100 195 25 170 25 125 L25 55 Z" fill="none" stroke="#c5a059" stroke-width="8"/>
                <path d="M75 75 H130 V90 H95 V110 H125 V125 H95 V145 H130 V160 H75 V75 Z" fill="#c5a059"/>
            </svg>
        </div>
        <h1 style="color: var(--gold); letter-spacing: 5px; margin-top: 10px;">EXILO</h1>
    </div>

    <div class="container">
        <div class="welcome-box">
            <h2 class="title">عالم إكسيلو الرقمي</h2>
            <p class="desc">بوابتك للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان.</p>
            
            <a href="https://wa.me/966503460060" class="btn-gold">احجز جلستك الآن</a>

            <div class="grid">
                <div class="card">
                    <h3>الدورات</h3>
                    <a href="#" class="card-link">تطوير الذات</a>
                    <a href="#" class="card-link">مهارات التدريب</a>
                </div>
                <div class="card">
                    <h3>الجلسات</h3>
                    <a href="#" class="card-link">استشارات خاصة</a>
                    <a href="#" class="card-link">استرخاء وتنويم</a>
                </div>
                <div class="card">
                    <h3>الكتب</h3>
                    <a href="#" class="card-link">كتب رقمية (PDF)</a>
                    <a href="#" class="card-link">عروض باور بوينت</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
