<!DOCTYPE html>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0b1d3a;
    color: white;
}

/* زر القائمة */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: gold;
    color: #000;
    padding: 15px;
    border-radius: 15px;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
}

/* القائمة */
.sidebar {
    position: fixed;
    right: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #fff;
    transition: 0.3s;
    padding: 20px;
}

.sidebar a {
    display: block;
    margin: 10px 0;
    color: blue;
    text-decoration: none;
}

/* البنر */
.banner img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.overlay {
    position: absolute;
    top: 0;
    width: 100%;
    height: 300px;
    background: rgba(0,0,0,0.5);
    text-align: center;
    padding-top: 60px;
}

.logo {
    color: gold;
    font-size: 30px;
    font-weight: bold;
}

.hero-title {
    font-size: 28px;
    margin-top: 10px;
}

.hero-sub {
    margin-top: 10px;
    font-size: 18px;
}

/* لماذا اكسيلو */
.section-title {
    text-align: center;
    color: gold;
    font-size: 26px;
    margin: 40px 0;
}

.box {
    background: #1c2f52;
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
}

footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: #000;
}

</style>
</head>

<!-- البنر -->

<script>
function toggleMenu(){
    let menu = document.getElementById("menu");
    if(menu.style.right === "0px"){
        menu.style.right = "-250px";
    } else {
        menu.style.right = "0px";
    }
}
</script>
