<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0b1e3a, #142f55);
  color: white;
}

.hero img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.section-title {
  text-align: center;
  margin: 30px 0;
  font-size: 26px;
  color: #d4af37;
  font-weight: 900;
}

.card {
  background: rgba(255,255,255,0.08);
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

.price {
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
}

.btn {
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  padding: 12px 25px;
  border-radius: 12px;
  color: black;
  text-decoration: none;
  font-weight: bold;
}

/* ===== الدفع ===== */
.payments {
  margin: 30px 20px;
  padding: 25px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  text-align: center;
}

/* ترتيب الشعارات */
.payment-logos {
  display: flex;
  justify-content: center;
  gap: 20px;
  align-items: center;
}

/* إزالة الخلفية البيضاء بصريًا 🔥 */
.payment-logos img {
  width: 70px;
  filter: brightness(0) invert(1); /* يحولها لأبيض */
  opacity: 0.9;
}

/* واتساب */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 14px 22px;
  border-radius: 30px;
  color: white;
  text-decoration: none;
}

footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}

</style>
</head>

<body>

<section class="hero">
  <img src="banner.png.PNG">
</section>

<div class="section-title">الدورات المتاحة</div>

<div class="card">
  <h3>دورة تحليل الشخصية</h3>
  <p>تحليل الخط والتوقيع والرسومات</p>
  <div class="price">149 ريال</div>
  <a href="#" class="btn">شراء الآن</a>
</div>

<div class="card">
  <h3>جلسات كوتشينج</h3>
  <p>جلسات تدريبية مباشرة</p>
  <div class="price">200 ريال</div>
  <a href="#" class="btn">احجز الآن</a>
</div>

<div class="payments">
  <h3>ادفع بثقة وأمان 🔒</h3>
  <p>نقبل الدفع عبر Apple Pay و مدى</p>

  <div class="payment-logos">
    <img src="mada.png.png">
    <img src="applepay.png.png">
  </div>
</div>

<a class="whatsapp" href="#">واتساب</a>

<footer>© 2026 EXILO</footer>

</body>
</html>
