<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكسيلو | EXILO - المدرب هاني آل حمدان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; --dark-grey: #0a0f1a; }
        * { box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); direction: rtl; margin: 0; overflow-x: hidden; }

        header { background: var(--navy); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .logo-text { color: var(--gold); font-weight: bold; font-size: 1.6rem; letter-spacing: 2px; text-decoration: none; }

        .hero { width: 100%; height: 350px; background: url('banner.png.jpg') center/cover no-repeat; border-bottom: 4px solid var(--gold); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .marketing { text-align: center; margin-bottom: 50px; }
        .marketing h2 { color: var(--gold); font-size: 2.2rem; margin-bottom: 15px; }

        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .card { background: rgba(255,255,255,0.03); width: 310px; padding: 25px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.15); text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(255,255,255,0.06); }

        .img-box { width: 100%; height: 350px; margin-bottom: 20px; overflow: hidden; border-radius: 15px; background: #000; border: 1px solid rgba(197, 160, 89, 0.1); }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }

        .btn { display: inline-block; width: 100%; color: #050a14; text-decoration: none; padding: 12px; background: var(--gold); border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #d4b477; }

        footer { background: var(--dark-grey); padding: 40px 20px; border-top: 2px solid var(--gold); text-align: center; }
        .social-links a { color: var(--gold); margin: 0 15px; font-size: 1.8rem; text-decoration: none; }
        .copyright { font-size: 0.85rem; color: #5a718a; margin-top: 25px; }
    </style>
</head>
<body>

    <header>
        <div style="width: 40px;"></div>
        <a href="index.html" class="logo-text">EXILO</a>
        <a href="https://wa.me/966538205304" style="background: var(--gold); color: var(--navy); padding: 8px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem;">تواصل معنا</a>
    </header>

    <div class="hero"></div>

    <div class="container">
        <div class="marketing">
            <h2>مرحباً بك في إكسيلو</h2>
            <p style="font-size: 1.2rem; color: #b0c4de;">بوابة التغيير والاستشفاء النفسي مع المدرب هاني آل حمدان</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="courses.png.jpg" alt="الدورات"></div>
                <h3>الدورات الرقمية</h3>
                <a href="courses-details.html" class="btn">اكتشف برامجنا</a>
            </div>

            <div class="card">
                <div class="img-box"><img src="sessions.png.PNG" alt="الجلسات والاستشارات"></div>
                <h3>الجلسات والاستشارات</h3>
                <a href="https://wa.me/966538205304?text=أريد+حجز+جلسة+استشارية" class="btn">احجز استشارتك الآن</a>
            </div>

            <div class="card">
                <div class="img-box"><img src="store.png.jpg" alt="المتجر"></div>
                <h3>المتجر الرقمي</h3>
                <a href="exelo-store.html" class="btn">تصفح الكتب</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.tiktok.com/@hanialhmdan"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.snapchat.com/add/hanialhmdan"><i class="fab fa-snapchat"></i></a>
        </div>
        <p class="copyright">&copy; 2026 إكسيلو | جميع الحقوق محفوظة للمدرب هاني آل حمدان</p>
    </footer>

</body>
</html>
