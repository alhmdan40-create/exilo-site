<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(#0f1f3a,#162a4d);
color:white;
overflow-x:hidden;
}

/* زر القائمة */
.menu-btn{
position:fixed;
top:20px;
right:20px;
background:gold;
color:black;
width:55px;
height:55px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
z-index:2000;
cursor:pointer;
}

/* الخلفية */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:1500;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* القائمة */
.sidebar{
position:fixed;
top:0;
right:-270px;
width:270px;
height:100%;
background:#162a4d;
padding:20px;
transition:0.3s;
z-index:2001;
}

.sidebar.active{
right:0;
}

/* زر الإغلاق */
.close-btn{
font-size:22px;
cursor:pointer;
text-align:left;
margin-bottom:10px;
}

.sidebar h2{
color:gold;
}

.sidebar a{
display:block;
margin:12px 0;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.05);
color:white;
text-decoration:none;
}

/* المحتوى */
.container{
padding:90px 20px 30px;
text-align:center;
}

.title{
color:gold;
font-size:32px;
margin-bottom:30px;
font-weight:bold;
}

/* الكروت */
.card{
background:rgba(255,255,255,0.05);
margin:20px auto;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
}

.card h3{
margin-bottom:20px;
}

/* زر */
.btn{
background:gold;
color:black;
padding:12px 30px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- الخلفية -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">

<div class="close-btn" onclick="closeMenu()">✕</div>

<h2>EXILO</h2>

<a href="#">🔐 تسجيل الدخول</a>

<hr>

<a href="course-analysis.html">تحليل الشخصيات</a>
<a href="course-body.html">لغة الجسد</a>
<a href="books.html">الكتب</a>
<a href="sessions.html">الجلسات</a>

<hr>

<a href="terms.html">الشروط والأحكام</a>

</div>

<!-- المحتوى -->
<div class="container">

<div class="title">الدورات</div>

<div class="card">
<h3>تحليل الشخصيات</h3>
<a href="course-analysis.html" class="btn">عرض</a>
</div>

<div class="card">
<h3>لغة الجسد</h3>
<a href="course-body.html" class="btn">عرض</a>
</div>

<div class="title">المنتجات</div>

<div class="card">
<h3>الكتب</h3>
<a href="books.html" class="btn">عرض</a>
</div>

<div class="card">
<h3>الجلسات</h3>
<a href="sessions.html" class="btn">عرض</a>
</div>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
