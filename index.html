<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root { --navy:#050a14; --gold:#c5a059; --text:#e6f1ff; --dark-grey:#0a0f1a; }

* { box-sizing:border-box; }

body {
  font-family:'Tajawal',sans-serif;
  background-color:var(--navy);
  color:var(--text);
  margin:0;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* الهيدر */
header {
  background:var(--navy);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--gold);
}

.logo-text { color:var(--gold); font-size:1.5rem; font-weight:bold; }

.login-btn {
  background:var(--gold);
  color:var(--navy);
  padding:8px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* المستخدم */
#userBox {
  color:var(--gold);
  font-weight:bold;
  margin-left:10px;
}

#logoutBtn {
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* البنر */
.hero {
  width:100%;
  height:350px;
  background:url('banner.png%202.PNG?v=100') center/cover no-repeat;
  border-bottom:4px solid var(--gold);
}

/* المحتوى */
.container { max-width:1200px; margin:40px auto; padding:0 20px; }

.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:30px; }

.card {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  border:1px solid rgba(197,160,89,0.3);
  padding:25px;
  width:340px;
  text-align:center;
}

.img-box {
  width:100%;
  height:280px;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:15px;
}

.img-box img { width:100%; height:100%; object-fit:cover; }

.btn {
  display:block;
  background:var(--gold);
  color:var(--navy);
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

/* الفوتر */
footer {
  background:var(--dark-grey);
  padding:40px 20px;
  text-align:center;
  border-top:2px solid var(--gold);
}

.footer-socials a {
  color:var(--gold);
  font-size:2rem;
  margin:0 15px;
}
</style>
</head>

<body>

<header>
  <div><i class="fas fa-bars" style="color:var(--gold);font-size:1.5rem;"></i></div>

  <div class="logo-text">EXILO</div>

  <div>
    <a href="login.html" class="login-btn" id="loginBtn">تسجيل دخول</a>
    <span id="userBox" style="display:none;"></span>
    <button id="logoutBtn" style="display:none;">خروج</button>
  </div>
</header>

<div class="hero"></div>

<div class="container">

<h2 style="text-align:center;color:var(--gold);">لماذا إكسيلو؟</h2>

<div class="grid">

<div class="card">
  <div class="img-box"><img src="courses.png.PNG?v=100"></div>
  <h3>الدورات الرقمية</h3>
  <a href="courses-details.html" class="btn">اكتشف</a>
</div>

<div class="card">
  <div class="img-box"><img src="sessions.png.PNG?v=100"></div>
  <h3>الجلسات</h3>
  <a href="https://wa.me/966538205304" class="btn">احجز</a>
</div>

<div class="card">
  <div class="img-box"><img src="store.png.jpg?v=100"></div>
  <h3>المتجر</h3>
  <a href="exelo-store.html" class="btn">تصفح</a>
</div>

</div>
</div>

<footer>
  <p>© جميع الحقوق محفوظة</p>
</footer>

<!-- Firebase (نسخة واحدة فقط) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1",
  storageBucket: "exilo-376f1.appspot.com",
  messagingSenderId: "736619072060",
  appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");
const userBox = document.getElementById("userBox");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    userBox.style.display = "inline";
    logoutBtn.style.display = "inline";
    userBox.textContent = user.email;
  } else {
    loginBtn.style.display = "inline";
    userBox.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

logoutBtn.onclick = () => {
  signOut(auth).then(() => location.reload());
};
</script>

</body>
</html>
