<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إكسيلو | Exilo</title>

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #0e2a47;
    color: white;
}

/* البنر */
.banner img {
    width: 100%;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
}

/* العنوان */
h2 {
    text-align: center;
    color: #d4af37;
    margin: 30px 0;
    font-size: 28px;
    font-weight: 900;
}

/* الأقسام */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: linear-gradient(135deg, #d4af37, #f5e6a6);
    color: #000;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* الخط الفاصل */
.line {
    height: 1px;
    background: #d4af37;
    margin: 40px 20px;
    opacity: 0.4;
}

/* زر واتساب */
.whatsapp-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: linear-gradient(135deg, #d4af37, #f5e6a6);
    color: #000;
    padding: 14px 20px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    z-index: 9999;
}

/* القائمة */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 999;
}

.sidebar {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #0e2a47;
    padding: 20px;
    transition: 0.3s;
    z-index: 1000;
}

.sidebar.active {
    right: 0;
}

.close-btn {
    font-size: 22px;
    cursor: pointer;
    margin-bottom: 20px;
    display: block;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 15px 0;
}

</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- القائمة الجانبية -->
<div class="sidebar" id="sidebar">
    <span class="close-btn" onclick="closeMenu()">✕</span>
    <a href="index.html">الرئيسية</a>
    <a href="courses.html">الدورات</a>
    <a href="books.html">الكتب</a>
    <a href="contact.html">تواصل معنا</a>
    <a href="terms.html">الشروط والأحكام</a>
</div>

<!-- البنر -->
<div class="banner">
    <img src="banner-new.png.PNG" alt="banner">
</div>

<h2>لماذا إكسيلو؟</h2>

<div class="grid">

<a href="course-analysis.html" class="card">
🚀 نصنع تحول حقيقي
</a>

<a href="course-body.html" class="card">
🧠 فهم عميق لذاتك
</a>

<a href="courses.html" class="card">
🎯 وضوح في حياتك
</a>

<a href="courses.html" class="card">
🔥 تغيير فعلي
</a>

</div>

<div class="line"></div>

<!-- زر شراء -->
<a href="https://wa.me/966538205304?text=السلام عليكم،%20أبغى%20شراء%20أحد%20دورات%20إكسيلو"
class="whatsapp-btn">
🛒 اشتري الآن
</a>

<script>
function openMenu() {
    document.getElementById("sidebar").classList.add("active");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("active");
}
</script>

</body>
</html>
