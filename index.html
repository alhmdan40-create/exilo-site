
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو | المدرب هاني آل حمدان</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --white: #ffffff;
            --site-bg: #fbfcfd;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--site-bg);
            direction: rtl;
            overflow-x: hidden;
            color: #333;
        }

        /* تنسيق البانر */
        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* طبقة إخفاء النص السفلي في البانر (لحذف عبارة المدرب) */
        .hide-text-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; /* مساحة كافية للتغطية */
            background-color: var(--site-bg);
            z-index: 5;
        }

        .content-container {
            max-width: 900px;
            margin: -40px auto 80px; /* تداخل خفيف مع البانر لزيادة الفخامة */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); /* ظل ناعم وأنيق */
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        /* --- تنسيق الشعار الكامل المدمج برمجياً (SVG) --- */
        .logo-svg-main {
            height: 120px; /* حجم بارز وملفت للدرع */
            width: auto;
            margin: 0 auto 30px;
            display: block;
            /* إضافة ظل ناعم للشعار ليعطيه عمقاً */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .welcome-title {
            color: var(--navy);
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .welcome-desc {
            color: #555;
            font-size: 1.15rem;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        /* تنسيق الزر المطلوب: احجز جلستك الآن */
        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.15rem;
            box-shadow: 0 5px 15px rgba(10,25,47,0.2);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(10,25,47,0.3);
            background-color: #112a4f;
        }

        @media (max-width: 768px) {
            .content-container { margin-top: -20px; }
            .welcome-box { padding: 30px 20px; }
            .logo-svg-main { height: 90px; margin-bottom: 20px; }
            .welcome-title { font-size: 1.8rem; }
            .welcome-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
        
        <div class="hide-text-mask"></div>
    </div>

    <div class="content-container">
        <section class="welcome-box">
            
            <div class="logo-svg-main">
                <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 L85 25 L85 70 C85 85 50 95 50 95 C50 95 15 85 15 70 L15 25 Z" fill="none" stroke="#b59410" stroke-width="4"/>
                    <path d="M50 10 L78 30 L78 68 C78 78 50 88 50 88 C50 88 22 78 22 68 L22 30 Z" fill="none" stroke="#b59410" stroke-width="1.5"/>
                    <path d="M38 38 H62 V45 H48 V50 H60 V57 H48 V62 H62 V70 H38 V38 Z" fill="#b59410"/>
                    <path d="M15 25 L50 5 L85 25" fill="none" stroke="#b59410" stroke-width="1.5"/>
                </svg>
            </div>
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            
            <p class="welcome-desc">
                بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.
            </p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
