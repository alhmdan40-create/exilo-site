<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cairo',sans-serif;
  background: linear-gradient(#0f1f3a,#162a4d);
  color:white;
  text-align:center;
}

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: gold;
  color: black;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  z-index: 1000;
}

/* القائمة الجانبية */
.sidebar {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  background: #0f1f3a;
  padding: 20px;
  transition: 0.4s;
  z-index: 999;
}

.sidebar.active {
  right: 0;
}

.sidebar h2 {
  color: gold;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

/* تسجيل الدخول */
.login-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.login-box {
  background: #0f1f3a;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.login-btn {
  background: gold;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}

.user-name {
  position: fixed;
  top: 20px;
  left: 20px;
  color: gold;
}

/* البنر */
.banner img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

/* الأقسام */
.section-title {
  color: gold;
  font-size: 28px;
  margin: 40px 0 20px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  width: 300px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.btn {
  background: gold;
  color: black;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
}

/* الفوتر */
footer {
  margin-top: 40px;
  padding: 20px;
  color: #aaa;
}

/* واتساب */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- اسم المستخدم -->
<div class="user-name" id="userName"></div>

<!-- زر القائمة -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">

<h2>EXILO</h2>

<a href="#" onclick="openLogin()">تسجيل الدخول</a>

<hr>

<a href="course-analysis.html">تحليل الشخصيات</a>
<a href="course-body.html">لغة الجسد</a>
<a href="books.html">الكتب</a>
<a href="sessions.html">الجلسات</a>

<hr>

<a href="terms.html">الشروط</a>

</div>

<!-- تسجيل الدخول -->
<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h3>تسجيل الدخول</h3>
    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="رقم الجوال">
    <button class="login-btn" onclick="login()">دخول</button>
  </div>
</div>

<!-- البنر -->
<div class="banner">
  <img src="banner.png.PNG">
</div>

<!-- الأقسام -->
<div class="section-title">الدورات</div>

<div class="container">

<div class="card">
<img src="analysis.png.PNG">
<div class="card-content">
<h3>تحليل الشخصيات</h3>
<a href="course-analysis.html" class="btn">عرض</a>
</div>
</div>

<div class="card">
<img src="body.png.PNG">
<div class="card-content">
<h3>لغة الجسد</h3>
<a href="course-body.html" class="btn">عرض</a>
</div>
</div>

</div>

<div class="section-title">المنتجات</div>

<div class="container">

<div class="card">
<img src="books.png.jpg">
<div class="card-content">
<h3>الكتب</h3>
<a href="books.html" class="btn">عرض</a>
</div>
</div>

<div class="card">
<img src="sessions.png.PNG">
<div class="card-content">
<h3>الجلسات</h3>
<a href="sessions.html" class="btn">عرض</a>
</div>
</div>

</div>

<!-- الفوتر -->
<footer>
<p>© 2026 EXILO. جميع الحقوق محفوظة.</p>
<a href="terms.html" style="color:gold;">الشروط والأحكام</a>
</footer>

<!-- واتساب -->
<a class="whatsapp" href="https://wa.me/966530205304">💬</a>

<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function openLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function login() {
  let name = document.getElementById("name").value;
  if(name === "") return;

  localStorage.setItem("userName", name);
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("userName").innerText = "👋 " + name;
}

window.onload = function() {
  let name = localStorage.getItem("userName");
  if(name) {
    document.getElementById("userName").innerText = "👋 " + name;
  }
}
</script>

</body>
</html>
