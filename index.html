<!DOCTYPE html>

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:#0a0f1c;
color:#fff;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),

border-radius:15px;

}

.card:hover{
transform:translateY(-10px);

.footer{
padding:30px;

</div>
</div>
