<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دورة لغة الجسد</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  background: #f3f3f3;
}

/* شريط علوي */
nav {
  background: black;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* القسم الأول */
.hero {
  text-align: center;
  padding: 50px;
}

.hero img {
  width: 250px;
  border-radius: 10px;
}

/* الكروت */
.cards {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  padding: 30px;
}

.card {
  background: white;
  width: 220px;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

/* تسجيل الدخول */
.login {
  text-align: center;
  padding: 40px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
}
</style>

</head>

<body>

<nav>
  <a href="#">الرئيسية</a>
  <a href="#">الدورة</a>
  <a href="#">تسجيل الدخول</a>
</nav>

<section class="hero">
  <h1>دورة لغة الجسد</h1>
  <p>تعلم قراءة الناس وفهم الإشارات غير اللفظية</p>
  <img src="https://i.imgur.com/8Km9tLL.jpg">
</section>

<section class="cards">
  <div class="card">
    <h3>الإشارات الأساسية</h3>
    <p>تعرف على الحركات</p>
  </div>

  <div class="card">
    <h3>تحليل الشخصية</h3>
    <p>افهم الآخرين</p>
  </div>

  <div class="card">
    <h3>لغة الجسد</h3>
    <p>طبقها في حياتك</p>
  </div>
</section>

<section class="login">
  <h2>تسجيل الدخول</h2>
  <input type="text" placeholder="اسم المستخدم">
  <input type="password" placeholder="كلمة المرور">
  <button>دخول</button>
</section>

</body>
</html>
