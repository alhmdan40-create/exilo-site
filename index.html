<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | أدواتك الذكية للارتقاء والاسترخاء | المدرب هاني آل حمدان</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
            --gold-light: #d4af37;
            --white: #ffffff;
            --bg-soft: #fbfcfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: #333;
            line-height: 1.8;
            direction: rtl;
        }

        /* شريط التنبيه الذهبي العلوي */
        .top-notice {
            background: linear-gradient(90deg, #b59410, #d4af37);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            position: relative;
            z-index: 100; /* لضمان ظهوره فوق كل شيء */
        }

        /* الهيدر المطور لتغطية عبارة المدرب */
        header {
            width: 100%;
            height: 480px;
            background-image: url('banner-top.png.PNG'); /* استخدام اسم الملف المرفوع */
            background-size: cover; /* لضمان ملء عرض الصفحة */
            background-position: top center; /* توسيع الصورة من الأعلى */
            background-repeat: no-repeat;
            background-color: var(--navy);
            border-bottom: 6px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        /* --- سر الحل: تغطية عبارة المدرب --- */
        header::after {
            content: '';
            position: absolute;
            bottom: 30px; /* تحديد الموقع الرأسي للتغطية */
            left: 0;
            width: 100%;
            height: 60px; /* تحديد الارتفاع الرأسي للتغطية */
            background-color: var(--navy); /* استخدام لون الكحلي الداكن للخلفية */
            z-index: 11;
        }

        /* مساحة المحتوى الأبيض */
        .container {
            max-width: 1000px;
            margin: -60px auto 80px; /* تداخل خفيف مع البانر لزيادة الفخامة */
            padding: 0 20px;
            position: relative;
            z-index: 15;
        }

        /* بطاقة الترحيب البيضاء */
        .welcome-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        /* اللوجو الصغير داخل الصفحة */
        .logo-small {
            height: 60px;
            margin: 0 auto 20px;
            display: block;
        }

        .welcome-card h2 {
            color: var(--navy);
            font-size: 2rem;
            margin-top: 0;
        }

        /* زر التواصل */
        .btn-cta {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 30px;
            transition: 0.3s ease;
        }

        .btn-cta:hover {
            transform: scale(1.05);
            background: #1a3a5f;
        }

        /* توافق الشاشات (لجعل البانر واضحاً على الجوال) */
        @media (max-width: 768px) {
            header {
                height: 350px; /* تقليل الارتفاع على الجوال ليتناسب مع الصورة */
            }
            header::after {
                height: 40px; /* تقليل مساحة التغطية على الجوال */
                bottom: 20px;
            }
            .welcome-card {
                padding: 30px 20px;
                margin-top: -30px;
            }
        }
    </style>
</head>
<body>

    <div class="top-notice">✨ بوابتكم الرقمية للارتقاء والاسترخاء | خصم خاص لفترة محدودة ✨</div>

    <header>
        </header>

    <div class="container">
        <section class="welcome-card">
            <img src="logo.png.PNG" alt="Exilo Logo" class="logo-small">
            
            <h2>مرحباً بك في عالم إكسيلو</h2>
            <p>نحن نقدم لك الأدوات العلمية والتدريبية الأكثر تطوراً للوصول إلى السلام الداخلي والارتقاء بجودة حياتك تحت إشراف المدرب هاني آل حمدان.</p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="btn-cta">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
