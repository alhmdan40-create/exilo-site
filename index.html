<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --navy: #050a14;
    --gold: #c5a059;
    --text: #e6f1ff;
    --dark-grey: #0a0f1a;
    --card-bg: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; transition: all 0.3s ease; }

body {
    font-family: 'Tajawal', sans-serif;
    background-color: var(--navy);
    color: var(--text);
    margin: 0;
}

/* القائمة الجانبية */
#sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: var(--dark-grey);
    padding: 25px;
    z-index: 2000;
    border-left: 2px solid var(--gold);
}

#sidebar a {
    display: block;
    color: var(--text);
    margin: 15px 0;
    text-decoration: none;
}

.menu-title { cursor: pointer; }
.submenu { display:none; padding-right:15px; }

#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:1500;
}

header {
    background: var(--navy);
    padding: 15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--gold);
}

.logout-btn {
    background: var(--gold);
    color: var(--navy);
    padding:7px 18px;
    border-radius:8px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    text-decoration:none;
}

.logo-text { color: var(--gold); font-weight:bold; }

.hero {
    height: 400px;
    background: linear-gradient(rgba(5,10,20,0.4), rgba(5,10,20,0.4)), url('banner.png%202.PNG');
    background-size: cover;
    background-position: center;
    border-bottom: 4px solid var(--gold);
}

.main-content { padding:60px 20px; }

/* باقي التصميم كما هو */
</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- القائمة -->
<div id="sidebar">
<div onclick="toggleSidebar()">✕</div>

<a href="index.html">🏠 الرئيسية</a>

<div class="menu-title" onclick="toggleMenu('coursesMenu')">🎓 الدورات ▾</div>
<div class="submenu" id="coursesMenu">
<a href="body-language-course.html">لغة الجسد</a>
<a href="character-analysis-course.html">تحليل الشخصيات</a>
</div>

<a href="sessions.html">💬 الجلسات</a>
<a href="exelo-store.html">🛒 المتجر</a>
<a href="reviews.html">⭐ آراء العملاء</a>
</div>

<header>

<div onclick="toggleSidebar()" style="cursor:pointer;">
<i class="fas fa-bars" style="color:gold;font-size:20px;"></i>
</div>

<div>
<button id="logoutBtn" class="logout-btn" onclick="logout()">خروج</button>
<a href="login.html" id="loginBtn" class="logout-btn" style="display:none;">تسجيل الدخول</a>
</div>

<div class="logo-text">EXILO</div>

</header>

<div class="hero"></div>

<main class="main-content">

<!-- باقي الصفحة كما هي (لم أعدل عليها) -->

</main>

<footer>
<p style="color:#5a718a;">© 2026 إكسيلو</p>
</footer>

<!-- 🔥 Firebase (الخروج + التحكم) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, (user) => {
    const logoutBtn = document.getElementById("logoutBtn");
    const loginBtn = document.getElementById("loginBtn");

    if (user) {
        logoutBtn.style.display = "inline-block";
        loginBtn.style.display = "none";
    } else {
        logoutBtn.style.display = "none";
        loginBtn.style.display = "inline-block";
    }
});

window.logout = function () {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
};
</script>

<script>
function toggleSidebar(){
let s=document.getElementById("sidebar");
let o=document.getElementById("overlay");

if(s.style.right==="0px"){
s.style.right="-260px";
o.style.display="none";
}else{
s.style.right="0px";
o.style.display="block";
}
}

function toggleMenu(id){
let m=document.getElementById(id);
m.style.display=(m.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
