<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكسيلو | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy-dark: #050c1a; /* كحلي عميق جداً للخلفية */
            --navy-card: #0a192f; /* كحلي للبطاقات */
            --gold: #b59410; 
            --text-light: #e6f1ff; 
            --text-gold: #d4af37;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            background-color: var(--navy-dark); /* تغيير الخلفية من الأبيض للكحلي الداكن */
            color: var(--text-light);
            direction: rtl; 
        }

        /* البانر العلوي */
        .hero-section {
            width: 100%;
            height: 350px;
            background: linear-gradient(rgba(5, 12, 26, 0.2), rgba(5, 12, 26, 0.8)), 
                        url('banner-top.png.PNG') center/cover no-repeat;
            border-bottom: 3px solid var(--gold);
        }

        .main-container { max-width: 1000px; margin: -100px auto 50px; padding: 0 20px; position: relative; z-index: 10; }

        /* الكرت الترحيبي (تم إلغاء اللون الأبيض) */
        .welcome-card { 
            background: var(--navy-card); 
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center;
            border: 1px solid rgba(181, 148, 16, 0.3); /* إطار ذهبي خفيف */
        }

        .shield-logo { width: 150px; height: 150px; margin: 0 auto 25px; display: block; }

        .title { color: var(--text-gold); font-size: 2.5rem; margin-bottom: 15px; font-weight: 700; }
        .desc { color: var(--text-light); line-height: 1.9; margin-bottom: 35px; font-size: 1.2rem; opacity: 0.9; }

        .btn-main { 
            display: inline-block; 
            background: linear-gradient(135deg, var(--gold), #8a700d);
            color: white; 
            padding: 16px 60px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(181, 148, 16, 0.4); }

        /* أقسام المنتجات */
        .sections-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 50px; }
        .section-item { 
            background: rgba(255, 255, 255, 0.05); /* خلفية شفافة داكنة */
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .section-item:hover { border-color: var(--gold); background: rgba(255, 255, 255, 0.08); }
        .section-item h3 { color: var(--text-gold); margin-bottom: 20px; font-size: 1.5rem; }
        
        .section-btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.1); 
            color: var(--text-light); 
            padding: 12px; 
            margin-top: 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .section-btn:hover { background: var(--gold); color: white; }
    </style>
</head>
<body>

    <div class="hero-section"></div>

    <div class="main-container">
        <div class="welcome-card">
            <div class="shield-logo">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 15 L170 50 L170 120 C170 160 100 190 100 190 C100 190 30 160 30 120 L30 50 Z" fill="none" stroke="#b59410" stroke-width="6"/>
                    <path d="M75 75 H125 V90 H95 V105 H120 V118 H95 V132 H125 V145 H75 V75 Z" fill="#b59410"/>
                </svg>
            </div>

            <h1 class="title">عالم إكسيلو الرقمي</h1>
            <p class="desc">نرافقك في رحلة التغيير من خلال أدوات ذكية تجمع بين العلم والسكينة، لتحقيق توازنك النفسي والمهني بأعلى معايير الجودة.</p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="btn-main">احجز جلستك الآن</a>

            <div class="sections-grid">
                <div class="section-item">
                    <h3>الدورات</h3>
                    <a href="#" class="section-btn">تطوير الذات</a>
                    <a href="#" class="section-btn">مهارات التدريب</a>
                </div>
                <div class="section-item">
                    <h3>الجلسات</h3>
                    <a href="#" class="section-btn">استشارات خاصة</a>
                    <a href="#" class="section-btn">استرخاء وتنويم</a>
                </div>
                <div class="section-item">
                    <h3>الكتب</h3>
                    <a href="#" class="section-btn">كتب رقمية PDF</a>
                    <a href="#" class="section-btn">حقائب باور بوينت</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
