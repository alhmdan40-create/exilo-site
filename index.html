<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>دورة لغة الجسد</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      direction: rtl;
    }

    nav {
      background: #222;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 18px;
    }

    section {
      padding: 60px;
      text-align: center;
    }

    .hero {
      background: #f5f5f5;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#home">الرئيسية</a>
    <a href="#course">الدورة</a>
    <a href="#login">تسجيل الدخول</a>
  </nav>

  <section id="home" class="hero">
    <h1>دورة لغة الجسد</h1>
    <p>تعلم قراءة الناس وفهم الإشارات غير اللفظية</p>
    <img src="body-language.jpg" width="300">
  </section>

  <section id="course">
    <h2>محتوى الدورة</h2>

    <div class="cards">
      <div class="card">
        <h3>الإشارات الأساسية</h3>
        <p>تعرف على الحركات الأساسية</p>
      </div>

      <div class="card">
        <h3>تحليل الشخصية</h3>
        <p>افهم تصرفات الآخرين</p>
      </div>

      <div class="card">
        <h3>لغة الجسد في العمل</h3>
        <p>استخدمها في حياتك اليومية</p>
      </div>
    </div>
  </section>

  <section id="login">
    <h2>تسجيل الدخول</h2>
    <input type="text" placeholder="اسم المستخدم">
    <br>
    <input type="password" placeholder="كلمة المرور">
    <br>
    <button>دخول</button>
  </section>

</body>
</html>
