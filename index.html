<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXILO</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0b1d3a;
}

/* الهيدر (زر القائمة) */
.header {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
}

.menu-btn {
  background: #f2c94c;
  width: 55px;
  height: 55px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
}

/* البنر */
.banner {
  position: relative;
}

.banner img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

/* طبقة فوق البنر */
.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  display: flex;
  justify-content: center;
  align-items: center;
}

/* النص */
.logo {
  color: #f2c94c;
  font-size: 36px;
  font-weight: bold;
}

</style>

</head>

<body>

<!-- الهيدر -->
<div class="header">
  <div class="menu-btn">☰</div>
</div>

<!-- البنر -->
<div class="banner">

  <!-- ⚠️ مهم: نفس اسم ملفك -->
  <img src="banner-top.png.PNG?v=5">

  <div class="overlay">
    <div class="logo">EXILO | إكسيلو</div>
  </div>

</div>

</body>
</html>
