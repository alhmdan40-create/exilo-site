
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --gold: #b59410; --site-bg: #fbfcfd; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--site-bg); direction: rtl; }

        /* البانر نظيف تماماً بدون لوجو */
        .banner-wrapper { position: relative; width: 100%; line-height: 0; border-bottom: 5px solid var(--gold); }
        .banner-img { width: 100%; height: auto; display: block; }

        .content-container { max-width: 900px; margin: -50px auto 80px; padding: 0 20px; position: relative; z-index: 10; }

        .welcome-box { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            text-align: center; 
            border-top: 6px solid var(--navy); 
        }

        /* حاوية الشعار المرسوم برمجياً */
        .logo-container { width: 140px; height: 140px; margin: 0 auto 25px; display: block; }

        .welcome-title { color: var(--navy); font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
        .welcome-desc { color: #555; font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; }

        .cta-btn { 
            display: inline-block; 
            background: var(--navy); 
            color: white; 
            padding: 18px 60px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(10,25,47,0.2);
            transition: 0.3s;
        }
        .cta-btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="banner-wrapper">
        <img src="banner-top.png.PNG" alt="Exilo" class="banner-img">
    </div>

    <div class="content-container">
        <section class="welcome-box">
            
            <div class="logo-container">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 20 L160 50 L160 110 C160 150 100 180 100 180 C100 180 40 150 40 110 L40 50 Z" fill="none" stroke="#b59410" stroke-width="8"/>
                    <path d="M100 35 L145 58 L145 105 C145 135 100 160 100 160 C100 160 55 135 55 105 L55 58 Z" fill="none" stroke="#b59410" stroke-width="2"/>
                    <path d="M75 70 H125 V85 H95 V100 H120 V115 H95 V130 H125 V145 H75 V70 Z" fill="#b59410"/>
                    <path d="M40 50 L100 20 L160 50" fill="none" stroke="#b59410" stroke-width="2" opacity="0.5"/>
                </svg>
            </div>
            
            <h1 class="welcome-title">مرحباً بك في عالم إكسيلو</h1>
            <p class="welcome-desc">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
