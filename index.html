<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --navy: #050a14;
    --gold: #c5a059;
    --text: #e6f1ff;
    --dark-grey: #0a0f1a;
    --card-bg: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; transition: all 0.3s ease; }

body {
    font-family: 'Tajawal', sans-serif;
    background-color: var(--navy);
    color: var(--text);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* 🔥 القائمة الجانبية */
#sidebar {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: var(--dark-grey);
    padding: 25px;
    z-index: 2000;
    border-left: 2px solid var(--gold);
}

#sidebar a {
    display: block;
    color: var(--text);
    margin: 15px 0;
    text-decoration: none;
}

.menu-title { cursor: pointer; margin: 15px 0; }

.submenu { display:none; padding-right:15px; }

#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:1500;
}

header {
    background: var(--navy);
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--gold);
}

.user-section {
    display: flex;
    align-items: center;
    gap: 12px;
}

.user-email { color: var(--gold); }

.logout-btn {
    background: var(--gold);
    color: var(--navy);
    padding: 7px 18px;
    border-radius: 8px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    text-decoration: none;
}

.logo-text { color: var(--gold); font-weight: bold; }

.hero {
    height: 400px;
    background: linear-gradient(rgba(5,10,20,0.4), rgba(5,10,20,0.4)), url('banner.png%202.PNG');
    background-size: cover;
    background-position: center;
    border-bottom: 4px solid var(--gold);
}

.main-content { padding: 60px 20px; }

.why-section {
    max-width: 1000px;
    margin: 0 auto 60px;
    text-align: center;
}

.why-section h2 {
    color: var(--gold);
    font-size: 2.5rem;
    margin-bottom: 40px;
}

.why-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
}

.why-card {
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    border: 1px solid rgba(197,160,89,0.3);
    padding: 25px 20px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.why-card i {
    font-size: 26px;
    color: var(--gold);
    margin-bottom: 12px;
}

.why-card p {
    line-height: 1.8;
    font-size: 1.05rem;
}

@media (max-width: 768px) {
    .why-grid { grid-template-columns: 1fr; }
}

.services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
    gap: 40px;
    max-width: 1200px;
    margin: 0 auto;
}

.service-card {
    background: var(--card-bg);
    border-radius: 25px;
    padding: 25px;
    text-align: center;
}

.image-container {
    height: 280px;
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 20px;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.action-btn {
    background: var(--gold);
    color: var(--navy);
    padding: 14px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    display: block;
}

footer {
    background: var(--dark-grey);
    padding: 50px 20px;
    border-top: 2px solid var(--gold);
    text-align: center;
}

.social-icons a {
    color: var(--gold);
    font-size: 2.2rem;
    margin: 0 20px;
}

.legal-links a {
    color: #8fa7c7;
    margin: 0 15px;
    text-decoration: none;
}

.reviews-section {
    max-width: 1000px;
    margin: 80px auto;
    text-align: center;
}
</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- 🔥 القائمة -->
<div id="sidebar">
<div onclick="toggleSidebar()" style="cursor:pointer;color:gold;">✕</div>

<a href="index.html">🏠 الرئيسية</a>

<div class="menu-title" onclick="toggleMenu('coursesMenu')">🎓 الدورات ▾</div>
<div class="submenu" id="coursesMenu">
<a href="body-language-course.html">لغة الجسد</a>
<a href="character-analysis-course.html">تحليل الشخصيات</a>
</div>

<a href="sessions.html">💬 الجلسات</a>

<div class="menu-title" onclick="toggleMenu('storeMenu')">🛒 المتجر ▾</div>
<div class="submenu" id="storeMenu">
<a href="exelo-store.html">الكتب</a>
</div>

<a href="reviews.html">⭐ آراء العملاء</a>
</div>

<header>

<!-- زر القائمة -->
<div onclick="toggleSidebar()" style="cursor:pointer;">
<i class="fas fa-bars" style="color:gold;font-size:20px;"></i>
</div>

<div class="user-section">
<span id="userEmail"></span>

<button id="logoutBtn" class="logout-btn" onclick="logout()">خروج</button>

<a href="login.html" id="loginBtn" class="logout-btn" style="display:none;">
تسجيل الدخول
</a>
</div>

<div class="logo-text">EXILO</div>
</header>

<!-- 🔥 سكربت القائمة -->
<script>
function toggleSidebar(){
    const s=document.getElementById("sidebar");
    const o=document.getElementById("overlay");

    if(s.style.right==="0px"){
        s.style.right="-260px";
        o.style.display="none";
    }else{
        s.style.right="0px";
        o.style.display="block";
    }
}

function toggleMenu(id){
    const m=document.getElementById(id);
    m.style.display=(m.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
