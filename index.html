<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  height: auto;
  display: block;
}

/* القسم */
.section {
  padding: 40px 15px;
}

/* العنوان */
.title {
  text-align: center;
  color: #f2c94c;
  font-size: 28px;
  margin-bottom: 30px;
  font-weight: 700;
}

/* الكروت */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 12px;
}

/* الكارد */
.card {
  width: 48%;
  background: linear-gradient(135deg, #1f3a5f, #2c4b75);
  padding: 18px;
  border-radius: 18px;
  text-align: center;
  box-sizing: border-box;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  border: 1px solid rgba(242, 201, 76, 0.3);
  transition: 0.3s;
}

/* تأثير */
.card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* الأيقونة */
.icon {
  font-size: 32px;
  margin-bottom: 10px;
}

/* النص */
.text {
  color: #ffffff;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG?v=30">
</div>

<!-- لماذا إكسيلو -->
<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
