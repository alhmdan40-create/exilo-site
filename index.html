<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو للمنتجات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --gold: #b59410; --site-bg: #fdfdfe; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--site-bg); direction: rtl; }

        /* منطقة البانر العلوية - تم دمج البنر المعتمد */
        .header-banner { 
            width: 100%; 
            height: 380px; 
            background: var(--navy) url('uploaded:image.png-5d8f635f-4796-4a4b-84a1-09855581f180') center/cover no-repeat;
            border-bottom: 5px solid var(--gold);
        }

        .main-container { max-width: 1000px; margin: -100px auto 60px; padding: 0 20px; position: relative; z-index: 10; }
        .welcome-card { 
            background: white; 
            padding: 45px; 
            border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 8px solid var(--navy); 
        }

        /* حاوية الشعار (الدرع الذهبي) مدمجة في الكود SVG */
        .logo-wrapper { width: 140px; height: 140px; margin: 0 auto 25px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }

        .title { color: var(--navy); font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
        .description { color: #555; line-height: 1.8; margin-bottom: 35px; font-size: 1.1rem; }

        .btn-booking { 
            display: inline-block; background: var(--navy); color: white; 
            padding: 16px 55px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; font-size: 1.25rem; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-booking:hover { background-color: #112a4f; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="main-container">
        <section class="welcome-card">
            <div class="logo-wrapper">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 15 L170 50 L170 120 C170 160 100 190 100 190 C100 190 30 160 30 120 L30 50 Z" fill="none" stroke="#b59410" stroke-width="6"/>
                    <path d="M75 75 H125 V90 H95 V105 H120 V120 H95 V135 H125 V150 H75 V75 Z" fill="#b59410"/>
                </svg>
            </div>
            
            <h1 class="title">مرحباً بك في عالم إكسيلو</h1>
            <p class="description">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
            
            <a href="https://wa.me/966XXXXXXXXX" class="btn-booking">احجز جلستك الآن</a>
        </section>
    </div>

</body>
</html>
