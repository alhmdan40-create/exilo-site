<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b1d3a;
}

/* البنر */
.banner img {
  width: 100%;
  display: block;
}

/* القسم */
.section {
  padding: 40px 20px;
}

.title {
  text-align: center;
  color: #f2c94c;
  font-size: 28px;
  margin-bottom: 30px;
  font-weight: bold;
}

/* الكروت */
.services {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.service {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  transition: 0.3s;
}

.service img {
  width: 100%;
  height: 230px;
  object-fit: cover;
}

.service-title {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  text-align: center;
  color: #f2c94c;
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.service:hover {
  transform: scale(1.03);
}

/* كمبيوتر */
@media (min-width: 700px) {
  .services {
    grid-template-columns: repeat(3, 1fr);
  }
}

</style>

</head>

<body>

<!-- البنر -->
<div class="banner">
  <img src="banner-top.png.PNG">
</div>

<!-- الخدمات -->
<div class="section">

  <div class="title">الخدمات</div>

  <div class="services">

    <!-- الجلسات -->
    <a href="sessions.html" class="service">
      <img src="sessions.png.PNG">
      <div class="service-title">الجلسات</div>
    </a>

    <!-- الدورات -->
    <a href="courses.html" class="service">
      <img src="courses.png.jpg">
      <div class="service-title">الدورات</div>
    </a>

    <!-- الكتب -->
    <a href="books.html" class="service">
      <img src="books.png.jpg">
      <div class="service-title">الكتب</div>
    </a>

  </div>

</div>

</body>
</html>
