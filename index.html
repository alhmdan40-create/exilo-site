<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b2341;
    color: white;
    text-align: center;
}

/* البنر */
.banner img {
    width: 100%;
    display: block;
}

/* العنوان */
h2 {
    color: gold;
    margin: 30px 0;
}

/* المربعات */
.boxes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
}

.box {
    padding: 30px;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
}

/* ألوان */
.box1 {background: linear-gradient(135deg,#3a5ba0,#4e7fff);}
.box2 {background: linear-gradient(135deg,#7b3fe4,#9ad0ec);}
.box3 {background: linear-gradient(135deg,#3bd16f,#6ef0a3);}
.box4 {background: linear-gradient(135deg,#ff5f6d,#ff9966);}

/* خط فاصل */
.line {
    height: 1px;
    background: gold;
    margin: 30px 40px;
    opacity: 0.3;
}

/* كروت */
.card {
    margin: 20px;
    background: #132c52;
    border-radius: 20px;
    padding: 20px;
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.btn {
    margin-top: 15px;
    background: gold;
    color: black;
    padding: 10px 20px;
    border-radius: 20px;
    display: inline-block;
    text-decoration: none;
}

/* القائمة */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #111;
    transition: 0.3s;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    margin: 10px 0;
    text-decoration: none;
}

.sidebar.open {
    right: 0;
}

/* الفوتر */
.footer {
    margin-top: 40px;
    padding: 20px;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- زر القائمة -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- القائمة -->
<div class="sidebar" id="menu">
    <a href="#">تسجيل الدخول</a>
    <a href="#">الدورات</a>
    <a href="#">الجلسات</a>
    <a href="#">الكتب</a>
    <a href="#">الشروط</a>
</div>

<!-- البنر (المهم🔥) -->
<div class="banner">
    <img src="banner-new.png.PNG">
</div>

<!-- لماذا اكسيلو -->
<h2>لماذا إكسيلو؟</h2>

<div class="boxes">
    <div class="box box1">🚀 نصنع تحول حقيقي</div>
    <div class="box box2">🧠 فهم عميق لذاتك</div>
    <div class="box box3">🎯 وضوح في حياتك</div>
    <div class="box box4">🔥 تغيير فعلي</div>
</div>

<div class="line"></div>

<!-- الجلسات -->
<div class="card">
    <img src="body.png.PNG">
    <h3 style="color:gold;">الجلسات</h3>
    <p>ابدأ أول خطوة نحو التغيير الحقيقي</p>
    <a href="#" class="btn">ابدأ الآن</a>
</div>

<!-- الدورات -->
<div class="card">
    <img src="courses.png.jpg">
    <h3 style="color:gold;">الدورات</h3>
    <p>تعلم مهارات تغير حياتك</p>
    <a href="#" class="btn">عرض الدورات</a>
</div>

<!-- الكتب -->
<div class="card">
    <img src="books.png.jpg">
    <h3 style="color:gold;">الكتب</h3>
    <p>مجموعة كتب تطوير الذات</p>
    <a href="#" class="btn">تصفح الكتب</a>
</div>

<!-- الفوتر -->
<div class="footer">
© جميع الحقوق محفوظة - EXILO
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
