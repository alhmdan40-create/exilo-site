<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو | المدرب هاني آل حمدان</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #b59410;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fbfcfd;
            direction: rtl;
            overflow-x: hidden;
        }

        /* حاوية الهيدر - تم حذف الشريط البرتقالي من هنا */
        header {
            width: 100%;
            height: 380px; /* تقليل الارتفاع لقص الجزء السفلي من الصورة */
            overflow: hidden; /* هذا السطر هو الذي سيخفي عبارة المدرب */
            background-color: var(--navy);
            border-bottom: 6px solid var(--gold);
            position: relative;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            /* إزاحة الصورة قليلاً للأعلى لضمان اختفاء النص السفلي */
            margin-top: -5px; 
        }

        .content-container {
            max-width: 1000px;
            margin: -60px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--navy);
        }

        .cta-btn {
            display: inline-block;
            background: var(--navy);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }

        .cta-btn:hover {
            background-color: var(--gold);
        }

        @media (max-width: 768px) {
            header { height: 240px; }
            .content-container { margin-top: -30px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="banner-top.png.PNG" alt="Exilo Banner" class="banner-img">
    </header>

    <div class="content-container">
        <section class="welcome-box">
            <h2 style="color: var(--navy);">مرحباً بك في عالم إكسيلو</h2>
            <p style="color: #555;">بوابتك الرقمية الحصرية للارتقاء بالذات وتحقيق التوازن النفسي والمهني بإشراف المدرب هاني آل حمدان بأساليب مبتكرة تدعم جودة حياتك.</p>
            <a href="https://wa.me/966XXXXXXXXX" class="cta-btn">احجز جلستك الاستشارية الآن</a>
        </section>
    </div>

</body>
</html>
