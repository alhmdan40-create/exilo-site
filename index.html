<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: #0b1d3a;
}

.banner img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

.section {
  padding: 40px 20px;
}

.title {
  text-align: center;
  color: #f2c94c;
  font-size: 26px;
  margin-bottom: 30px;
  font-weight: bold;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 15px;
}

.card {
  width: 48%;
  background: #1e2a44;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-sizing: border-box;
}

.icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.text {
  color: white;
}

@media (max-width: 600px) {
  .card {
    width: 100%;
  }
}

</style>

</head>

<body>

<div class="banner">
  <img src="banner-top.png.PNG">
</div>

<div class="section">

  <div class="title">لماذا إكسيلو؟</div>

  <div class="cards">

    <div class="card">
      <div class="icon">🚀</div>
      <div class="text">لا نقدم معلومات... بل نصنع تحول حقيقي</div>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <div class="text">اكتشف أنماطك وسلوكك بعمق</div>
    </div>

    <div class="card">
      <div class="icon">🎯</div>
      <div class="text">انتقل من التشتت إلى الوضوح</div>
    </div>

    <div class="card">
      <div class="icon">🔥</div>
      <div class="text">التغيير يبدأ بالفعل وليس بالكلام</div>
    </div>

  </div>

</div>

</body>
</html>
