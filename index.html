<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>
body{
background:#050a14;
color:#fff;
font-family:Tajawal;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:2px solid #c5a059;
}

.logout{
background:#c5a059;
padding:6px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.hero{
height:250px;
background:url('banner.png 2.PNG?v=5') center/cover;
}

.container{
padding:20px;
}

.card{
background:#0a0f1a;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.btn{
display:block;
background:#c5a059;
padding:10px;
margin-top:10px;
border-radius:8px;
text-decoration:none;
color:#000;
}

footer{
text-align:center;
padding:30px;
border-top:2px solid #c5a059;
}
</style>
</head>

<body>

<header>
<div>EXILO</div>

<div>
<span id="userEmail"></span>
<button class="logout" onclick="logout()">خروج</button>
</div>
</header>

<div class="hero"></div>

<div class="container">

<div class="card">
<img src="sessions.png.PNG?v=5">
<h3>الجلسات</h3>
<a href="https://wa.me/966538205304" class="btn">احجز</a>
</div>

<div class="card">
<img src="store.png.jpg?v=5">
<h3>المتجر</h3>
<a href="exelo-store.html" class="btn">تصفح</a>
</div>

</div>

<footer>
© 2026 إكسيلو
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnlu9c0Dzo",
authDomain: "exilo-376f1.firebaseapp.com",
projectId: "exilo-376f1",
storageBucket: "exilo-376f1.appspot.com",
messagingSenderId: "736619072060",
appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("userEmail").textContent=user.email;
}else{
window.location.href="login.html";
}
});

window.logout=function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
}
</script>

</body>
</html>
