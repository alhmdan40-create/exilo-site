<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إكسيلو | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; --dark-grey: #0a0f1a; }
* { box-sizing: border-box; }
body { font-family: 'Tajawal'; background: var(--navy); color: var(--text); margin: 0; }

/* الهيدر */
header {
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;border-bottom:2px solid var(--gold);
}

.login-btn {
background: var(--gold);
color: var(--navy);
padding: 7px 15px;
border-radius: 8px;
text-decoration: none;
font-weight: bold;
font-size: 0.85rem;
cursor: pointer;
}

/* البنر */
.hero {
height: 350px;
background: url('banner.png%202.PNG') center/cover no-repeat;
border-bottom: 4px solid var(--gold);
}

/* الأقسام */
.container { max-width: 1100px; margin: auto; padding: 20px; }

.grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }

.card {
background: rgba(255,255,255,0.03);
width: 300px;
padding: 20px;
border-radius: 15px;
text-align:center;
}

.img-box {
width:100%; height:220px;
overflow:hidden; border-radius:10px;
}

.img-box img { width:100%; height:100%; object-fit:cover; }

.btn {
display:block;
background:var(--gold);
padding:10px;
border-radius:8px;
color:#000;
text-decoration:none;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div>EXILO</div>

<div id="authArea">
<a href="login.html" class="login-btn">تسجيل دخول</a>
</div>

</header>

<!-- البنر -->
<div class="hero"></div>

<!-- الأقسام -->
<div class="container">

<h2 style="text-align:center;color:var(--gold)">لماذا إكسيلو؟</h2>

<div class="grid">

<div class="card">
<div class="img-box"><img src="courses.png.PNG"></div>
<h3>الدورات الرقمية</h3>
<a href="courses-details.html" class="btn">اكتشف</a>
</div>

<div class="card">
<div class="img-box"><img src="sessions.png.PNG"></div>
<h3>الجلسات</h3>
<a href="https://wa.me/966538205304" class="btn">احجز</a>
</div>

<div class="card">
<div class="img-box"><img src="store.png.jpg"></div>
<h3>المتجر</h3>
<a href="exelo-store.html" class="btn">تصفح</a>
</div>

</div>
</div>

<!-- الفوتر -->
<footer style="text-align:center;padding:30px;border-top:2px solid var(--gold)">
© 2026 إكسيلو - جميع الحقوق محفوظة
</footer>

<!-- 🔥 Firebase (بدون تخريب التصميم) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1",
  storageBucket: "exilo-376f1.appspot.com",
  messagingSenderId: "736619072060",
  appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authArea = document.getElementById("authArea");

onAuthStateChanged(auth, (user) => {

  if (user) {
    authArea.innerHTML = `
      <span style="color:#c5a059;margin-left:10px;">👤 ${user.email}</span>
      <button onclick="logout()" class="login-btn">خروج</button>
    `;
  }

});

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

</script>

</body>
</html>
