<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exilo | إكسيلو للارتقاء والاسترخاء</title>
    <style>
        :root { --navy: #0a192f; --gold: #b59410; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f9; direction: rtl; }
        .top-bar { background: linear-gradient(90deg, #b59410, #d4af37); color: white; text-align: center; padding: 12px; font-weight: bold; }
        
        header {
            width: 100%;
            height: 450px;
            /* استخدام الاسم الدقيق الظاهر في لقطة الشاشة */
            background-image: url('banner-top.png.PNG'); 
            background-size: cover;
            background-position: center;
            background-color: var(--navy);
            border-bottom: 5px solid var(--gold);
        }

        .main-content { max-width: 900px; margin: -50px auto 50px; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        h1 { color: var(--navy); }
        .cta-button { display: inline-block; background-color: var(--navy); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 30px; }
        
        .logo-small { height: 60px; margin-bottom: 10px; }
        footer { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="top-bar">✨ بوابتكم الرقمية للارتقاء والاسترخاء | خصم خاص لفترة محدودة ✨</div>
    <header></header>
    <div class="main-content">
        <img src="logo.png.PNG" alt="Exilo Logo" class="logo-small">
        <h1>مرحباً بك في عالم إكسيلو</h1>
        <p>نحن نقدم لك الأدوات الذكية للوصول إلى السلام الداخلي والارتقاء بجودة حياتك تحت إشراف المدرب هاني آل حمدان.</p>
        <a href="https://wa.me/966500000000" class="cta-button">احجز جلستك الاستشارية الآن</a>
    </div>
    <footer><p>جميع الحقوق محفوظة &copy; 2026 | EXILO</p></footer>
</body>
</html>
