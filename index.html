* {

}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(#0f1f3a,#162a4d);
  color: white;
  text-align: center;

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: gold;
  color: black;
  width: 50px;
  height: 50px;
  border-radius: 12px;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}

/* القائمة الجانبية */
.sidebar {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  background: #0f1f3a;
  padding: 20px;
  transition: 0.3s;
  z-index: 999;
}

.sidebar.active {
  right: 0;
}

.sidebar h2 {
  color: gold;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

/* البنر */
.banner img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

/* العناوين */
.section-title {
  color: gold;
  font-size: 30px;
  margin: 40px 0 20px;
  font-weight: bold;
}

/* الكروت */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card h3 {
  margin: 15px 0;
}

.btn {
  background: gold;
  color: black;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
  margin-bottom: 20px;
  font-weight: bold;
}

/* واتساب */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
  font-size: 20px;
}

/* الفوتر */
footer {
  margin-top: 40px;
  padding: 20px;
  color: #aaa;
}

</style>
