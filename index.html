<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f1f3a;
  color:white;
}

/* زر القائمة */
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: gold;
  color: black;
  width: 50px;
  height: 50px;
  border-radius: 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:1001;
}

/* الخلفية الشفافة */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

.overlay.active {
  display:block;
}

/* القائمة */
.sidebar {
  position: fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#0f1f3a;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active {
  right:0;
}

.sidebar a {
  display:block;
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- زر -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- الخلفية -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">

<h2 style="color:gold;">EXILO</h2>

<a href="#">تسجيل الدخول</a>
<a href="#">تحليل الشخصيات</a>
<a href="#">لغة الجسد</a>
<a href="#">الكتب</a>
<a href="#">الجلسات</a>

</div>

<script>

/* فتح */
function openMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

/* إغلاق */
function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
