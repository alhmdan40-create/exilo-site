<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo', sans-serif;
background:#0f172a;
color:#fff;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:#020617;
z-index:1000;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

/* LOGO */
.logo img{
height:45px;
}

/* MENU BUTTON */
.menu-btn{
font-size:26px;
cursor:pointer;
color:#d4af37;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:-300px;
width:280px;
height:100%;
background:#020617;
padding:20px;
transition:0.3s;
z-index:2000;
}

.sidebar.active{
right:0;
}

.close-btn{
font-size:20px;
cursor:pointer;
color:white;
}

/* SIDEBAR TEXT */
.sidebar h3{
margin-top:20px;
color:#d4af37;
}

.sidebar a{
display:block;
margin:12px 0;
text-decoration:none;
color:#e5e7eb;
font-size:15px;
}

.sidebar a:hover{
color:#d4af37;
}

/* BANNER */
.banner{
background:
linear-gradient(rgba(10,15,30,0.7), rgba(10,15,30,0.8)),
url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
background-size:cover;
background-position:center;
padding:100px 20px;
text-align:center;
}

.banner h1{
font-size:70px;
margin:0;
}

.banner-text{
font-size:22px;
color:#d1d5db;
margin-top:10px;
}

/* PAYMENT */
.payments-section{
padding:40px;
text-align:center;
background:#1e293b;
margin:20px;
border-radius:12px;
}

.payment-icons{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.payment-icons img{
width:80px;
background:#fff;
padding:10px;
border-radius:10px;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#1e293b;
padding:25px;
width:250px;
border-radius:12px;
border:1px solid #334155;
}

/* FOOTER */
.footer{
padding:30px;
background:#020617;
text-align:center;
border-top:1px solid #334155;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="nav">

<!-- زر القائمة -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- اللوجو -->
<div class="logo">
<img src="logo.png" alt="EXILO">
</div>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="close-btn" onclick="closeMenu()">✖</div>

<h3>تسجيل الدخول</h3>
<a href="#">دخول</a>
<a href="#">إنشاء حساب</a>

<h3>منتجاتنا</h3>
<a href="#">تحليل الشخصية</a>
<a href="#">لغة الجسد</a>

</div>

<!-- BANNER -->
<div class="banner">
<h1>EXILO</h1>
<p class="banner-text">التوازن يبدأ من هنا</p>
</div>

<!-- PAYMENT -->
<div class="payments-section">
<h3>ادفع بسهولة وأمان 🔒</h3>

<div class="payment-icons">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Mada_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
</div>

<p>نقبل الدفع عبر مدى و Apple Pay</p>
</div>

<!-- FOOTER -->
<div class="footer">
<p>© 2026 EXILO</p>
<p style="font-size:13px; opacity:0.7;">
جميع الحقوق محفوظة. هذا الموقع وجميع محتوياته محمية بموجب حقوق النشر.
</p>
</div>

<script>

function openMenu(){
document.getElementById("sidebar").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}

</script>

</body>
</html>
