<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحميل الكتب | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --navy:#050a14;
    --gold:#c5a059;
    --text:#e6f1ff;
}

body{
    margin:0;
    font-family:'Tajawal',sans-serif;
    background:var(--navy);
    color:var(--text);
    text-align:center;
}

.section{
    padding:60px 20px;
    max-width:800px;
    margin:auto;
}

h1{
    color:var(--gold);
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.04);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
    border:2px solid var(--gold);
}

.btn{
    display:block;
    background:var(--gold);
    color:var(--navy);
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="section">

<h1>📚 تحميل كتب EXILO</h1>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">
<h3>📕 كتاب ترميم الثقة</h3>

</div>

</html>
