<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسرار لغة الجسد | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); margin: 0; direction: rtl; line-height: 1.8; }
        
        /* ✅ البنر الاحترافي الموحد للعزل (لجعل الشعار يبرز) ✅ */
        .top-banner { 
            width: 100%; height: 320px; 
            background: url('banner.png 2.PNG') no-repeat center center; 
            background-size: cover; display: flex; align-items: center; justify-content: center; position: relative;
            border-bottom: 4px solid var(--gold);
        }
        
        /* طبقة العزل لضمان وضوح شعار EXILO */
        .top-banner::after { 
            content: ''; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5, 10, 20, 0.75); /* تظليل غامق لعزل الخلفية المزعجة */
            z-index: 1;
        }

        .banner-content { position: relative; z-index: 10; text-align: center; }
        .banner-logo { font-size: 3.8rem; font-weight: bold; color: var(--gold); margin: 0; line-height: 1; letter-spacing: 2px; }
        
        .back-link { 
            position: absolute; top: 25px; right: 25px; z-index: 100; 
            color: var(--gold); text-decoration: none; font-weight: bold; 
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px;
            font-size: 0.95rem;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        
        /* ✅ تنسيق بطاقة المحتوى الجديد والصورة التعريفية ✅ */
        .course-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 20px; overflow: hidden; margin-bottom: 40px; display: flex; flex-direction: column; transition: 0.3sEase; }
        .course-card:hover { transform: translateY(-3px); border-color: var(--gold); }
        @media (min-width: 768px) { .course-card { flex-direction: row; } .course-img { width: 45%; } .course-info { width: 55%; } }
        
        /* ✅ احتواء صورة اليد ومنع خروجها ✅ */
        .course-img { background: #000; height: 380px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .course-img img { width: 100%; height: 100%; object-fit: contain; } /* لظهور كامل الصورة الموقعة */
        
        .course-info { padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .course-info h2 { color: var(--gold); margin-top: 0; font-size: 2rem; }
        .course-info p { color: #b0c4de; margin-bottom: 25px; font-size: 1.15rem; line-height: 1.8; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(197, 160, 89, 0.1); padding-top: 25px; }
        .price-tag { font-size: 1.8rem; color: var(--gold); font-weight: bold; }
        .buy-btn { background: var(--gold); color: var(--navy); padding: 14px 35px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .buy-btn:hover { background: #e0b86a; box-shadow: 0 0 20px rgba(197, 160, 89, 0.5); }

        footer { text-align: center; padding: 60px 40px 40px; color: #8fa7c7; font-size: 1rem; border-top: 1px solid rgba(197, 160, 89, 0.1); margin-top: 60px; }
    </style>
</head>
<body>

    <div class="top-banner">
        <a href="courses-details.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للدورات</a>
        <div class="banner-content">
            <p class="banner-logo">EXILO</p>
            <p style="color: white; margin-top: 10px; font-size: 1.4rem;">وعي، مهارة، تمكين</p>
        </div>
    </div>

    <div class="container">
        <div class="course-card">
            <div class="course-img"><img src="body.png.PNG" alt="لغة الجسد"></div>
            <div class="course-info">
                <h2>أسرار لغة الجسد والكاريزما</h2>
                <p>امتلك مهارة قراءة الأفكار عبر الجسد وفرض حضورك في أي مكان. حقيبة PowerPoint احترافية متكاملة بلمسة المدرب هاني آل حمدان.</p>
                <div class="price-row">
                    <span class="price-tag">250 ريال</span>
                    <a href="https://wa.me/966538205304?text=أرغب+في+دورة+لغة+الجسد" class="buy-btn">اشترك الآن عبر الواتساب</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 إكسيلو | جميع الحقوق محفوظة لـ هاني آل حمدان</p>
    </footer>

</body>
</html>
