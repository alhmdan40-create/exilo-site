<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); margin: 0; direction: rtl; line-height: 1.8; }
        
        .top-banner { 
            width: 100%; height: 280px; 
            background: url('banner.png 2.PNG') no-repeat center center; 
            background-size: cover; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .top-banner::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 20, 0.7); z-index: 1; }
        .banner-content { position: relative; z-index: 10; text-align: center; }
        .banner-logo { font-size: 3rem; font-weight: bold; color: var(--gold); margin: 0; }
        .back-link { position: absolute; top: 20px; right: 20px; z-index: 100; color: var(--gold); text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; }

        .content { max-width: 700px; margin: 40px auto; padding: 20px; }
        h1 { color: var(--gold); text-align: center; font-size: 2.2rem; }
        .benefit-box { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(197,160,89,0.1); margin: 30px 0; }
        
        /* ✅ كرت الاشتراك الموحد ✅ */
        .action-card { background: rgba(197, 160, 89, 0.08); border: 2px solid var(--gold); border-radius: 25px; padding: 30px; text-align: center; margin-top: 40px; }
        .price-tag { font-size: 3rem; font-weight: bold; color: var(--gold); display: block; margin-bottom: 20px; }
        .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--gold); color: var(--navy); padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.3rem; transition: 0.3s; }
        .whatsapp-btn:hover { background: #e0b86a; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="top-banner">
        <a href="courses-details.html" class="back-link"><i class="fas fa-arrow-right"></i> الدورات</a>
        <div class="banner-content"><h1 class="banner-logo">EXILO</h1><p style="color:white">وعي، مهارة، تمكين</p></div>
    </div>

    <div class="content">

        <div class="benefit-box">
            <h3>ماذا ستتعلم؟</h3>
            <ul style="list-style: none; padding: 0;">
                <li><i class="fas fa-check-circle" style="color:var(--gold)"></i> كشف الكذب وحركات اليدين.</li>
                <li><i class="fas fa-check-circle" style="color:var(--gold)"></i> بناء كاريزما قوية في المقابلات.</li>
                <li><i class="fas fa-check-circle" style="color:var(--gold)"></i> فهم إيماءات العيون ونظرات الثقة.</li>
            </ul>
        </div>

        <div class="action-card">
            <span class="price-tag">250 ريال</span>
            <a href="https://wa.me/966538205304?text=أرغب+في+دورة+لغة+الجسد" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> اشترك الآن عبر الواتساب
            </a>
        </div>
    </div>
</body>
</html>
