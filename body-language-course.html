<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الدورة | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ✅ تنسيقات عامة تمنع التداخل ✅ */
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); margin: 0; padding: 0; direction: rtl; overflow-x: hidden; }

        /* ✅ إصلاح البنر العلوي (منع تكرار EXILO) ✅ */
        .hero-banner {
            width: 100%;
            height: 320px;
            background: linear-gradient(rgba(5, 10, 20, 0.7), rgba(5, 10, 20, 0.7)), url('banner.png 2.PNG');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 2px solid var(--gold);
        }

        .nav-back { position: absolute; top: 20px; right: 20px; z-index: 20; }
        .nav-back a { background: rgba(197, 160, 89, 0.2); color: var(--gold); padding: 8px 15px; border-radius: 8px; text-decoration: none; border: 1px solid var(--gold); font-size: 0.9rem; }

        .banner-text-area { text-align: center; z-index: 10; }
        .banner-text-area h1 { color: var(--gold); font-size: 3.5rem; margin: 0; font-weight: bold; letter-spacing: 2px; }
        .banner-text-area p { color: white; margin: 5px 0 0; font-size: 1.2rem; opacity: 0.9; }

        /* ✅ تنسيق البطاقة الرئيسية ✅ */
        .main-wrapper { max-width: 550px; margin: -40px auto 50px; padding: 0 15px; position: relative; z-index: 30; }
        
        .content-box {
            background: #0a111f;
            border-radius: 25px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .main-img { width: 100%; height: auto; display: block; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }

        .info-area { padding: 30px; }
        .info-area h2 { color: var(--gold); font-size: 1.8rem; margin: 0 0 15px 0; }
        .info-area p { color: #b0c4de; line-height: 1.7; font-size: 1.1rem; margin-bottom: 25px; }

        /* ✅ إصلاح السعر وزر الواتساب (تنسيق عرضي مرتب) ✅ */
        .order-section {
            background: rgba(197, 160, 89, 0.05);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .price-display { display: flex; flex-direction: column; }
        .price-val { font-size: 1.8rem; font-weight: bold; color: var(--gold); line-height: 1; }
        .price-cur { font-size: 0.9rem; color: #8fa7c7; margin-top: 5px; }

        .btn-whatsapp {
            background: var(--gold);
            color: var(--navy);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            flex-grow: 1;
            justify-content: center;
        }
        .btn-whatsapp:hover { background: #e0b86a; transform: scale(1.02); }
    </style>
</head>
<body>

    <header class="hero-banner">
        <div class="nav-back"><a href="courses-details.html"><i class="fas fa-arrow-right"></i> العودة</a></div>
        <div class="banner-text-area">
            <h1>EXILO</h1>
            <p>وعي، مهارة، تمكين</p>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="content-box">
            <img src="body.png.PNG" class="main-img" alt="دورة تدريبية">
            
            <div class="info-area">
                <h2>أسرار لغة الجسد والكاريزما</h2>
                <p>امتلك مهارة قراءة الأفكار عبر الجسد وفرض حضورك في أي مكان. حقيبة PowerPoint احترافية متكاملة بلمسة المدرب هاني آل حمدان.</p>
                
                <div class="order-section">
                    <div class="price-display">
                        <span class="price-val">250</span>
                        <span class="price-cur">ريال سعودي</span>
                    </div>
                    <a href="https://wa.me/966538205304" class="btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> اشترك الآن
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
