<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<title>لغة الجسد</title>

<style>
body {
  margin:0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(#0f1f3a,#162a4d);
  color:white;
  text-align:center;
}

/* العنوان */
h1 {
  color: gold;
  margin-top:30px;
  font-weight:700;
}

/* الكرت */
.container {
  display:flex;
  justify-content:center;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  width:340px;
  overflow:hidden;
}

/* الصورة */
.card img {
  width:100%;
  height:240px;
  object-fit:cover;
}

/* النص */
.card-content {
  padding:20px;
  line-height:1.8;
  font-weight:600;
}

/* السعر */
.price {
  color:gold;
  font-size:24px;
  font-weight:700;
}

/* الزر */
.btn {
  background:gold;
  color:black;
  padding:12px 25px;
  border-radius:12px;
  text-decoration:none;
  display:inline-block;
  margin-top:10px;
  font-weight:700;
}
</style>
</head>

<body>

<h1>دورة لغة الجسد</h1>

<div class="container">
<div class="card">

<img src="body.png.PNG">

<div class="card-content">

<p>
هل شعرت يومًا أنك لا تفهم ما يخفيه الآخرون؟

في هذه الدورة ستتعلم قراءة لغة الجسد بعمق،
وفهم الإشارات التي لا يلاحظها معظم الناس.

✔ قراءة تعابير الوجه  
✔ فهم الإشارات الخفية  
✔ اكتشاف التردد والكذب  
✔ بناء حضور قوي وثقة عالية  

هذه ليست مجرد دورة… بل مهارة تغير حياتك.
</p>

<div class="price">149 ريال</div>

<a href="#" class="btn">شراء الآن</a>

</div>
</div>
</div>

</body>
</html>
