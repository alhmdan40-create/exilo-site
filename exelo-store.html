<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر الرقمي | EXILO</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; --dark-grey: #0a0f1a; }
        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--navy);
            color: var(--text);
            direction: rtl;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 🔥 البنر */
        .top-banner {
            width: 100%;
            height: 220px;
            background: url('banner.png 2.PNG') center/cover no-repeat;
            border-bottom: 3px solid var(--gold);
        }

        header {
            background: var(--navy);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .marketing {
            text-align: center;
            margin-bottom: 50px;
        }

        .marketing h2 {
            color: var(--gold);
            font-size: 2.2rem;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.3s;
        }

        .card {
    border: 2px solid rgba(197,160,89,0.6);
    border-radius: 25px;
    padding: 25px;
    margin: 25px 0;
    background: rgba(255,255,255,0.02);
    box-shadow: 0 0 25px rgba(197,160,89,0.15);
}
        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.06);
        }

        .img-box {
            width: 100%;
            height: 420px;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-detail {
            display: inline-block;
            width: 100%;
            color: #050a14;
            padding: 12px;
            background: var(--gold);
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        footer {
            background: var(--dark-grey);
            padding: 30px;
            border-top: 2px solid var(--gold);
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<!-- 🔥 البنر -->
<div class="top-banner"></div>

<header>
    <a href="index.html" class="logo-text">EXILO</a>
</header>

<div class="container">
    <div class="marketing">
        <h2>المكتبة الرقمية</h2>
        <p>اضغط على الكتاب لقراءة التفاصيل واكتشاف المحتوى</p>
    </div>

    <div class="grid">
        <a href="personality-book.html" class="card-link">
  <div class="card">
    <div class="img-box">
      <img src="exilo-personality-book.jpg.PNG">
    </div>
    <h3>أنماط الشخصيات وفهم النفسيات</h3>
    <div class="btn-detail">عرض التفاصيل</div>
  </div>
</a>
        <a href="serenity-book.html" class="card-link">
            <div class="card">
                <div class="img-box"><img src="serenity.png.jpg"></div>
                <h3>دليل السكينة</h3>
                <div class="btn-detail">عرض التفاصيل</div>
            </div>
        </a>

        <a href="mind-code-book.html" class="card-link">
            <div class="card">
                <div class="img-box"><img src="mind-code.png.jpg"></div>
                <h3>شفرة العقل الباطن</h3>
                <div class="btn-detail">عرض التفاصيل</div>
            </div>
        </a>

        <a href="trust-book.html" class="card-link">
            <div class="card">
                <div class="img-box"><img src="trust.png.PNG"></div>
                <h3>ترميم الثقة</h3>
                <div class="btn-detail">عرض التفاصيل</div>
            </div>
        </a>
    </div>
</div>

<footer>
    <p style="font-size: 0.85rem; color: #5a718a;">
        &copy; 2026 إكسيلو | جميع الحقوق محفوظة للمدرب هاني آل حمدان
    </p>
</footer>

</body>
</html>
