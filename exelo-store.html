<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر الرقمي | EXILO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; --dark-grey: #0a0f1a; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); direction: rtl; display: flex; flex-direction: column; }

        header { background: var(--navy); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .menu-btn { color: var(--gold); font-size: 1.6rem; cursor: pointer; }
        .logo-text { color: var(--gold); font-weight: bold; font-size: 1.4rem; letter-spacing: 2px; text-decoration: none; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; flex: 1; }
        .marketing { text-align: center; margin-bottom: 50px; }
        .marketing h2 { color: var(--gold); font-size: 2.2rem; margin-bottom: 15px; }

        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .card { background: rgba(255,255,255,0.03); width: 310px; padding: 25px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.15); text-align: center; }
        
        /* تنسيق عرض غلاف الكتاب */
        .img-box { width: 100%; height: 380px; margin: 0 auto 20px; overflow: hidden; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .img-box img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        .btn { display: inline-block; width: 100%; color: #050a14; text-decoration: none; padding: 12px; background: var(--gold); border-radius: 10px; font-weight: bold; margin-top: 10px; }

        footer { background: var(--dark-grey); padding: 40px 20px; border-top: 2px solid var(--gold); text-align: center; margin-top: 50px; }
        .copyright { font-size: 0.85rem; color: #5a718a; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn"><i class="fas fa-bars"></i></div>
        <a href="index.html" class="logo-text">EXILO</a>
        <div style="width: 50px;"></div> </header>

    <div class="container">
        <div class="marketing">
            <h2>المكتبة الرقمية</h2>
            <p>إصدارات حصرية للمدرب هاني آل حمدان لصناعة التغيير والاستقرار النفسي.</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="serenity.png"></div>
                <h3>دليل السكينة</h3>
                <a href="serenity-book.html" class="btn">تفاصيل الكتاب</a>
            </div>
            <div class="card">
                <div class="img-box"><img src="mind-code.png"></div>
                <h3>شفرة العقل الباطن</h3>
                <a href="mind-code-book.html" class="btn">تفاصيل الكتاب</a>
            </div>
            <div class="card">
                <div class="img-box"><img src="trust.png"></div>
                <h3>ترميم الثقة</h3>
                <a href="trust-book.html" class="btn">تفاصيل الكتاب</a>
            </div>
        </div>
    </div>

    <footer>
        <p class="copyright">&copy; 2026 إكسيلو | جميع الحقوق محفوظة لـ هاني آل حمدان</p>
    </footer>

</body>
</html>
