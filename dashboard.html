<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إكسيلو</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .course-card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .course-card img { width: 100%; border-radius: 8px; }
        .btn-access { background: #34a853; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .logout-btn { background: #ea4335; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>مرحباً بك في منصة إكسيلو التدريبية</h2>
    <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
</div>

<div class="courses-grid">
    <div class="course-card">
        <h3>دليل السكينة</h3>
        <p>فن الاسترخاء الجسدي والذهني</p>
        <button class="btn-access">عرض المحتوى</button>
    </div>

    <div class="course-card">
        <h3>لغة الجسد</h3>
        <p>احتراف قراءة الإيماءات</p>
        <button class="btn-access">عرض المحتوى</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAmsD5f05l_T78",
    authDomain: "exilo-376f1.firebaseapp.com",
    projectId: "exilo-376f1",
    storageBucket: "exilo-376f1.appspot.com",
    messagingSenderId: "736619072060",
    appId: "1:736619072060:web:286dc36624f3be2d2a9139"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // حماية الصفحة: إذا لم يكن المستخدم مسجلاً، أخرجه لصفحة الدخول
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  // أمر تسجيل الخروج
  document.getElementById('logoutBtn').onclick = () => {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  };
</script>

</body>
</html>
