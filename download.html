<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحميل الكتب | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --navy:#050a14;
    --gold:#c5a059;
    --text:#e6f1ff;
}

body{
    margin:0;
    font-family:'Tajawal',sans-serif;
    background:var(--navy);
    color:var(--text);
}

/* البنر */
.hero{
    height:300px;
    background: linear-gradient(rgba(5,10,20,0.4), rgba(5,10,20,0.4)),
    url('banner.png%202.PNG');
    background-size:cover;
    background-position:center;
}

/* المحتوى */
.section{
    padding:50px 20px;
    max-width:900px;
    margin:auto;
}

h1{
    color:var(--gold);
    text-align:center;
    margin-bottom:30px;
}

.book{
    background:rgba(255,255,255,0.04);
    border:2px solid var(--gold);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
}

.btn{
    display:block;
    text-align:center;
    background:var(--gold);
    color:var(--navy);
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="hero"></div>

<div class="section">

<h1>📚 تحميل كتبك</h1>

<div class="book">
<h3>📘 الكتاب الأول</h3>
<a href="https://raw.githubusercontent.com/alhmdan40-create/exilo-site/main/%D9%83%D8%AA%D8%A7%D8%A8%20%D8%AF%D9%84%D9%8A%D9%84%20%D8%A7%D9%84%D8%B3%D9%83%D9%8A%D9%86%D8%A9%20%D8%B1%D9%82%D9%85%20%D9%88%D8%A7%D8%AD%D8%AF.pdf" class="btn">تحميل كتاب (دليل السكينة)</a>
</div>

<div class="book">
<h3>📘 الكتاب الثاني</h3>
<a href="https://raw.githubusercontent.com/alhmdan40-create/exilo-site/main/%D8%AA%D9%86%D9%88%D9%8A%D9%85.pdf" class="btn">تحميل كتاب (شيفرة العقل الباطن)</a>
</div>

<div class="book">
<h3>📘 الكتاب الثالث</h3>
<a href="https://raw.githubusercontent.com/alhmdan40-create/exilo-site/main/%D8%AA%D8%B1%D9%85%D9%8A%D9%85%20%D8%A7%D9%84%D8%AB%D9%82%D8%A9.pdf" class="btn">تحميل كتاب (ترميم الثقة)</a>
</div>

</div>

</body>
</html>
