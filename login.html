<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --navy: #050a14;
    --gold: #c5a059;
    --text: #e6f1ff;
}

body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: var(--navy);
}

/* البنر */
.hero {
    width: 100%;
    height: 200px;
    background: url('banner.png%202.PNG') center/cover no-repeat;
    border-bottom: 3px solid var(--gold);
}

/* الحاوية */
.container {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

/* مربع تسجيل الدخول */
.login-box {
    width: 100%;
    max-width: 380px;
    padding: 25px;
    border-radius: 18px;
    border: 2px solid var(--gold);
    background: rgba(5,10,20,0.95);
    text-align: center;
}

h2 {
    color: var(--gold);
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.login-btn {
    background: var(--gold);
    color: var(--navy);
}

.signup-btn {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
}
</style>
</head>

<body>

<!-- البنر -->
<div class="hero"></div>

<!-- الفورم -->
<div class="container">
    <div class="login-box">
        <h2>تسجيل الدخول</h2>

        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">

        <button class="login-btn" onclick="login()">دخول</button>
        <button class="signup-btn" onclick="signup()">إنشاء حساب</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1",
  storageBucket: "exilo-376f1.appspot.com",
  messagingSenderId: "736619072060",
  appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        window.location.href = "index.html";
    })
    .catch((error) => {
        alert(error.message);
    });
}

window.signup = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("تم إنشاء الحساب بنجاح");
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
