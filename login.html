<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - EXILO</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #050a14, #0f1b2e);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 1px solid rgba(197,160,89,0.3);
      backdrop-filter: blur(10px);
    }

    h2 {
      color: #c5a059;
      margin-bottom: 25px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #c5a059;
      color: #050a14;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>تسجيل الدخول</h2>

  <input id="email" type="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="loginUser()">تسجيل الدخول</button>
  <button onclick="registerUser()">إنشاء حساب</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
    authDomain: "exilo-376f1.firebaseapp.com",
    projectId: "exilo-376f1",
    storageBucket: "exilo-376f1.appspot.com",
    messagingSenderId: "736619072060",
    appId: "1:736619072060:web:286dc36624f3be2d2a9139"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.registerUser = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("تم إنشاء الحساب ✅"))
      .catch((error) => alert(error.message));
  };

  window.loginUser = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("تم تسجيل الدخول 🎉"))
      .catch((error) => alert(error.message));
  };
</script>

</body>
</html>
