<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>

<button onclick="login()">دخول</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnlu9c0Dzo",
authDomain: "exilo-376f1.firebaseapp.com",
projectId: "exilo-376f1",
storageBucket: "exilo-376f1.appspot.com",
messagingSenderId: "736619072060",
appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login=function(){
const email=email.value;
const password=password.value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{window.location.href="index.html"})
.catch(e=>alert(e.message));
}
</script>

</body>
</html>
