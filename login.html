<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #050a14;
  --gold: #c5a059;
  --text: #e6f1ff;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: var(--navy);
  color: var(--text);
  overflow-x: hidden;
}

/* البنر */
.hero {
  width: 100%;
  height: 250px;
  background: url("banner.png 2.PNG") center/cover no-repeat;
  border-bottom: 3px solid var(--gold);
}

/* مربع تسجيل الدخول */
.login-box {
  width: 100%;
  max-width: 300px; /* 👈 أصغر */
  margin: -60px auto 0;
  transform: translateX(8px); /* 👈 ميل خفيف ومتوازن */
  padding: 35px;
  border-radius: 22px;
  text-align: center;

  background: rgba(255,255,255,0.05);

  /* الإطار الذهبي */
  border-right: 2px solid var(--gold);
  border-left: 2px solid var(--gold);
  border-top: 1px solid rgba(197,160,89,0.2);
  border-bottom: 1px solid rgba(197,160,89,0.2);

  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* العنوان */
.login-box h2 {
  color: var(--gold);
  margin-bottom: 25px;
}

/* الحقول */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  background: #0f1625;
  color: white;
  font-size: 15px;
}

/* الأزرار */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--gold);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

.secondary {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
}
</style>
</head>

<body>

<!-- البنر -->
<div class="hero"></div>

<!-- مربع تسجيل الدخول -->
<div class="login-box">
  <h2>تسجيل الدخول</h2>

  <input id="email" type="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="loginUser()">تسجيل الدخول</button>
  <button class="secondary" onclick="registerUser()">إنشاء حساب</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1",
  storageBucket: "exilo-376f1.appspot.com",
  messagingSenderId: "736619072060",
  appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* إنشاء حساب */
window.registerUser = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("اكتب البيانات أولاً ⚠️");
    return;
  }

  if (!email.includes("@")) {
    alert("البريد الإلكتروني غير صحيح ❌");
    return;
  }

  if (password.length < 6) {
    alert("كلمة المرور لازم تكون 6 أحرف على الأقل 🔒");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("تم إنشاء الحساب 🎉"))
    .catch((error) => alert(error.message));
};

/* تسجيل دخول */
window.loginUser = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("اكتب البيانات أولاً ⚠️");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch((error) => alert(error.message));
};
</script>

</body>
</html>
