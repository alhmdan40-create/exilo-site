<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول | EXILO</title>

  <!-- خط احترافي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #fbbf24;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #f59e0b;
    }

    .login {
      background: #0ea5e9;
      color: white;
    }

    .login:hover {
      background: #0284c7;
    }

    .note {
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>مرحبًا بك في EXILO</h2>

    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="registerUser()">إنشاء حساب</button>
    <button class="login" onclick="loginUser()">تسجيل الدخول</button>

    <div class="note">ابدأ رحلتك نحو التوازن الآن</div>
  </div>

  <!-- 🔥 Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnlu9c0Dzo",
      authDomain: "exilo-376f1.firebaseapp.com",
      projectId: "exilo-376f1",
      storageBucket: "exilo-376f1.appspot.com",
      messagingSenderId: "736619072060",
      appId: "1:736619072060:web:286dc36624f3be2d2a9139"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // إنشاء حساب
    window.registerUser = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("تم إنشاء الحساب بنجاح 🎉"))
        .catch((error) => alert(error.message));
    };

    // تسجيل دخول
    window.loginUser = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => alert("تم تسجيل الدخول بنجاح ✅"))
        .catch((error) => alert(error.message));
    };
  </script>

</body>
</html>
