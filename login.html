<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إكسيلو</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #34a853; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2d8e47; }
        .footer-links { margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #1a73e8; text-decoration: none; }
        #message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>تسجيل الدخول - EXILO</h2>
    <p>مرحباً بك مجدداً في منصتك التدريبية</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button id="loginBtn">دخول</button>
    
    <div id="message"></div>

    <div class="footer-links">
        ليس لديك حساب؟ <a href="signup.html">أنشئ حساباً الآن</a>
    </div>
</div>

<script type="module">
  // استدعاء مكتبات Firebase للتعرف على المستخدم
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // إعدادات مشروعك إكسيلو (التي استخرجناها من صورك)
  const firebaseConfig = {
    apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAmsD5f05l_T78",
    authDomain: "exilo-376f1.firebaseapp.com",
    projectId: "exilo-376f1",
    storageBucket: "exilo-376f1.appspot.com",
    messagingSenderId: "736619072060",
    appId: "1:736619072060:web:286dc36624f3be2d2a9139",
    measurementId: "G-TT3SM78XNS"
  };

  // تفعيل الاتصال بجوجل
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // عند الضغط على زر الدخول
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    try {
      // محاولة التحقق من البيانات في قاعدة البيانات
      await signInWithEmailAndPassword(auth, email, password);
      messageDiv.style.color = "green";
      messageDiv.innerText = "تم تسجيل الدخول بنجاح! جاري تحويلك لوحة التحكم...";
      
      // توجيه المتدرب لصفحة الدورات (تأكد من تسمية ملفك القادم dashboard.html)
      setTimeout(() => {
          window.location.href = "dashboard.html"; 
      }, 2000);

    } catch (error) {
      messageDiv.style.color = "red";
      // رسائل خطأ واضحة للمستخدم
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          messageDiv.innerText = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
      } else {
          messageDiv.innerText = "حدث خطأ: تأكد من اتصالك بالإنترنت.";
      }
    }
  };
</script>

</body>
</html>
