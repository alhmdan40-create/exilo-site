<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | EXILO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #050a14;
  --gold: #c5a059;
  --text: #e6f1ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(180deg, #050a14, #0a0f1a);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* الكارد */
.login-box {
  background: rgba(255,255,255,0.03);
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  border: 1px solid rgba(197,160,89,0.2);
  backdrop-filter: blur(10px);
}

/* العنوان */
.login-box h2 {
  color: var(--gold);
  margin-bottom: 25px;
  font-size: 1.8rem;
}

/* الحقول */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 15px;
  background: #0f1625;
  color: white;
}

/* الأزرار */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--gold);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  transition: 0.3s;
}

button:hover {
  opacity: 0.85;
}

/* زر ثانوي */
.secondary {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
}
</style>
</head>

<body>

<div class="login-box">

  <h2>تسجيل الدخول</h2>

  <input id="email" type="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="loginUser()">تسجيل الدخول</button>
  <button class="secondary" onclick="registerUser()">إنشاء حساب جديد</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnIu9c0Dzo",
  authDomain: "exilo-376f1.firebaseapp.com",
  projectId: "exilo-376f1",
  storageBucket: "exilo-376f1.appspot.com",
  messagingSenderId: "736619072060",
  appId: "1:736619072060:web:286dc36624f3be2d2a9139"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// تسجيل
window.registerUser = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "" || password === "") {
    alert("اكتب البيانات أولاً ⚠️");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("تم إنشاء الحساب 🎉"))
    .catch((error) => alert(error.message));
};

// دخول
window.loginUser = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "" || password === "") {
    alert("اكتب البيانات أولاً ⚠️");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "account.html";
    })
    .catch((error) => alert(error.message));
};

</script>

</body>
</html>
