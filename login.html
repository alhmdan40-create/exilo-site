<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
</head>

<body>

  <h2>تسجيل الدخول</h2>

  <input id="email" type="email" placeholder="البريد الإلكتروني"><br><br>
  <input id="password" type="password" placeholder="كلمة المرور"><br><br>

  <button onclick="registerUser()">إنشاء حساب</button>
  <button onclick="loginUser()">تسجيل الدخول</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAGTSnlu9c0Dzo",
      authDomain: "exilo-376f1.firebaseapp.com",
      projectId: "exilo-376f1",
      storageBucket: "exilo-376f1.appspot.com",
      messagingSenderId: "736619072060",
      appId: "1:736619072060:web:286dc36624f3be2d2a9139"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.registerUser = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("تم إنشاء الحساب"))
        .catch((error) => alert(error.message));
    };

    window.loginUser = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => alert("تم تسجيل الدخول"))
        .catch((error) => alert(error.message));
    };

  </script>

</body>
</html>
