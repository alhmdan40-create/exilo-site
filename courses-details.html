<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدورات الرقمية | إكسيلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #050a14; --gold: #c5a059; --text: #e6f1ff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--navy); color: var(--text); margin: 0; direction: rtl; }
        header { background: var(--navy); padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: bold; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .course-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 20px; overflow: hidden; margin-bottom: 40px; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .course-card { flex-direction: row; } .course-img { width: 45%; } .course-info { width: 55%; } }
        .course-img { background: #000; height: 350px; display: flex; align-items: center; justify-content: center; }
        .course-img img { width: 100%; height: 100%; object-fit: contain; }
        .course-info { padding: 30px; display: flex; flex-direction: column; }
        .course-info h2 { color: var(--gold); margin-top: 0; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px solid rgba(197, 160, 89, 0.1); padding-top: 20px; }
        .price-tag { font-size: 1.5rem; color: var(--gold); font-weight: bold; }
        .buy-btn { background: var(--gold); color: var(--navy); padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .buy-btn:hover { background: #e0b86a; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> الرئيسية</a>
        <div style="color: var(--gold); font-weight: bold;">EXILO</div>
    </header>

    <div class="container">
        <h1 style="text-align: center; color: var(--gold);">حقائبنا التدريبية الرقمية</h1>
        
        <div class="course-card">
            <div class="course-img"><img src="body.png.PNG"></div>
            <div class="course-info">
                <h2>دورة لغة الجسد</h2>
                <p>امتلك مهارة قراءة الأفكار عبر الجسد. حقيبة تدريبية احترافية بصيغة PowerPoint.</p>
                <div class="price-row">
                    <span class="price-tag">250 ريال</span>
                    <a href="body-language-course.html" class="buy-btn">احصل عليها الآن</a>
                </div>
            </div>
        </div>

        <div class="course-card">
            <div class="course-img"><img src="analysis.png.PNG"></div>
            <div class="course-info">
                <h2>تحليل الشخصيات (الجرافولوجي)</h2>
                <p>افهم خفايا النفس من خلال الخط والتوقيع. عرض تقديمي شامل ومتكامل.</p>
                <div class="price-row">
                    <span class="price-tag">300 ريال</span>
                    <a href="character-analysis-course.html" class="buy-btn">احصل عليها الآن</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
