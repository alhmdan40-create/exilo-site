<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - إكسيلو</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        #message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>انضم إلى إكسيلو</h2>
    <p>قم بإنشاء حسابك للوصول إلى الدورات</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور (6 أحرف على الأقل)" required>
    <button id="signupBtn">إنشاء الحساب</button>
    <div id="message"></div>
</div>

<script type="module">
  // استدعاء مكتبات Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // إعدادات مشروعك EXILO المستخرجة من Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCnzxPucUqpX_hYnir3aZAmsD5f05l_T78",
    authDomain: "exilo-376f1.firebaseapp.com",
    projectId: "exilo-376f1",
    storageBucket: "exilo-376f1.appspot.com",
    messagingSenderId: "736619072060",
    appId: "1:736619072060:web:286dc36624f3be2d2a9139",
    measurementId: "G-TT3SM78XNS"
  };

  // تفعيل Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // منطق الضغط على الزر
  document.getElementById('signupBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    try {
      // محاولة إنشاء الحساب في قاعدة بيانات Firebase
      await createUserWithEmailAndPassword(auth, email, password);
      messageDiv.style.color = "green";
      messageDiv.innerText = "تم إنشاء الحساب بنجاح! سيتم توجيهك قريباً.";
      // يمكنك هنا إضافة توجيه لصفحة تسجيل الدخول أو الدورات
    } catch (error) {
      messageDiv.style.color = "red";
      // ترجمة الأخطاء الشائعة للعربية
      if (error.code === 'auth/email-already-in-use') {
          messageDiv.innerText = "هذا البريد الإلكتروني مسجل مسبقاً.";
      } else if (error.code === 'auth/weak-password') {
          messageDiv.innerText = "كلمة المرور ضعيفة جداً.";
      } else {
          messageDiv.innerText = "حدث خطأ: " + error.message;
      }
    }
  };
</script>

</body>
</html>
